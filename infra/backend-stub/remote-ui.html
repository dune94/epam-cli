<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>EPAM CLI — Remote Session</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a1a2e;--surface:#16213e;--bubble-user:#0f3460;--bubble-ai:#2a2a4a;--text:#e0e0e0;--text-dim:#888;--accent:#00d2ff;--danger:#ff4757;--radius:12px;--safe-bottom:env(safe-area-inset-bottom,0px)}
html{height:100%;overflow:hidden}
body{height:100%;font-family:-apple-system,system-ui,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;position:fixed;width:100%;top:0;left:0}

/* Screens */
.screen{display:none;position:absolute;top:0;left:0;right:0;bottom:0;flex-direction:column}
.screen.active{display:flex}

/* Loading screen */
#loading{justify-content:center;align-items:center;gap:16px;text-align:center;padding:24px}
#loading .spinner{width:48px;height:48px;border:4px solid var(--surface);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading .status{color:var(--text-dim);font-size:14px}
#loading .error{color:var(--danger);font-size:14px;max-width:320px;word-break:break-word}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surface);border-bottom:1px solid #2a2a4a;flex-shrink:0;z-index:10}
header .meta{font-size:12px;color:var(--text-dim)}
header .meta strong{color:var(--accent);font-weight:600}
#return-btn{background:var(--danger);border:none;color:#fff;padding:10px 18px;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;min-height:44px;white-space:nowrap}
#return-btn:active{opacity:.7}
#return-btn:disabled{opacity:.4}

/* Messages — the key scrolling fix */
#messages{
  flex:1;
  overflow-y:scroll;
  -webkit-overflow-scrolling:touch;
  padding:12px 16px;
  display:flex;
  flex-direction:column;
  gap:8px;
  overscroll-behavior-y:contain;
}
.msg{max-width:85%;padding:10px 14px;border-radius:var(--radius);font-size:14px;line-height:1.5;word-wrap:break-word;white-space:pre-wrap}
.msg.user{align-self:flex-end;background:var(--bubble-user);border-bottom-right-radius:4px}
.msg.assistant{align-self:flex-start;background:var(--bubble-ai);border-bottom-left-radius:4px}
.msg.system{align-self:center;background:none;color:var(--text-dim);font-size:12px;font-style:italic}
.msg.streaming{border-left:3px solid var(--accent);animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.msg-spacer{flex-shrink:0;height:1px}

/* Input bar */
#input-bar{display:flex;gap:8px;padding:12px 16px;padding-bottom:calc(12px + var(--safe-bottom));background:var(--surface);border-top:1px solid #2a2a4a;flex-shrink:0;z-index:10}
#user-input{flex:1;background:#0a0a1a;border:1px solid #2a2a4a;border-radius:var(--radius);color:var(--text);padding:10px 14px;font-size:16px;font-family:inherit;resize:none;min-height:44px;max-height:120px;line-height:1.4}
#user-input:focus{outline:none;border-color:var(--accent)}
#send-btn{background:var(--accent);color:#000;border:none;border-radius:var(--radius);padding:0 20px;font-size:15px;font-weight:600;cursor:pointer;min-height:44px;min-width:60px}
#send-btn:disabled{opacity:.4;cursor:default}
#send-btn:active:not(:disabled){opacity:.8}

/* Returned screen */
#returned{justify-content:center;align-items:center;gap:12px;text-align:center;padding:24px}
#returned .check{font-size:64px;color:var(--accent)}
#returned h2{color:var(--text)}
#returned p{color:var(--text-dim);font-size:14px;line-height:1.6}
</style>
</head>
<body>

<!-- Loading / Claiming -->
<div id="loading" class="screen active">
  <div class="spinner"></div>
  <div class="status" id="load-status">Claiming session…</div>
</div>

<!-- Chat -->
<div id="chat" class="screen">
  <header>
    <div class="meta"><strong id="model-label">—</strong> · <span id="turn-count">0</span> turns</div>
    <button id="return-btn">↩ Return to Desktop</button>
  </header>
  <div id="messages"><div class="msg-spacer"></div></div>
  <div id="input-bar">
    <textarea id="user-input" rows="1" placeholder="Type a message…" enterkeyhint="send"></textarea>
    <button id="send-btn">Send</button>
  </div>
</div>

<!-- Returned -->
<div id="returned" class="screen">
  <div class="check">&#10003;</div>
  <h2>Session Returned</h2>
  <p>You can close this tab.<br>The desktop CLI will auto-reclaim your messages.</p>
</div>

<script>
(async () => {
  const $loading  = document.getElementById('loading');
  const $status   = document.getElementById('load-status');
  const $chat     = document.getElementById('chat');
  const $returned = document.getElementById('returned');
  const $messages = document.getElementById('messages');
  const $input    = document.getElementById('user-input');
  const $send     = document.getElementById('send-btn');
  const $returnBtn= document.getElementById('return-btn');
  const $model    = document.getElementById('model-label');
  const $turns    = document.getElementById('turn-count');

  function showScreen(el) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
  }
  function showError(msg) {
    $status.innerHTML = '';
    const e = document.createElement('div');
    e.className = 'error';
    e.textContent = msg;
    $status.parentNode.appendChild(e);
    document.querySelector('.spinner')?.remove();
  }
  function scrollToBottom() {
    requestAnimationFrame(() => {
      $messages.scrollTop = $messages.scrollHeight;
    });
  }

  // ── 1. Extract token and key from URL ──────────────────────────────────
  const pathParts = window.location.pathname.split('/remote/');
  const token = pathParts[1];
  const keyHex = window.location.hash.slice(1);

  if (!token) return showError('Invalid link — no session token.');
  if (!keyHex || keyHex.length !== 64) return showError('Invalid link — missing or bad encryption key.');

  const keyBytes = new Uint8Array(keyHex.match(/.{2}/g).map(b => parseInt(b, 16)));

  let cryptoKey;
  try {
    cryptoKey = await crypto.subtle.importKey('raw', keyBytes, { name: 'AES-GCM' }, false, ['decrypt', 'encrypt']);
  } catch { return showError('Failed to import encryption key.'); }

  // ── 2. Claim session ───────────────────────────────────────────────────
  $status.textContent = 'Claiming session…';
  let bundle;
  try {
    const resp = await fetch('/v1/remote/sessions/' + token);
    if (resp.status === 404) return showError('Session not found or expired.');
    if (resp.status === 409) return showError('Session already claimed on another device.');
    if (!resp.ok) return showError('Claim failed: HTTP ' + resp.status);
    bundle = await resp.json();
  } catch (e) { return showError('Network error: ' + e.message); }

  // ── 3. Decrypt ─────────────────────────────────────────────────────────
  $status.textContent = 'Decrypting…';
  let sessionData;
  try {
    const nonce = Uint8Array.from(atob(bundle.nonce), c => c.charCodeAt(0));
    const ciphertext = Uint8Array.from(atob(bundle.encryptedPayload), c => c.charCodeAt(0));
    const tag = Uint8Array.from(atob(bundle.tag), c => c.charCodeAt(0));

    const combined = new Uint8Array(ciphertext.length + tag.length);
    combined.set(ciphertext);
    combined.set(tag, ciphertext.length);

    const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: nonce }, cryptoKey, combined);
    sessionData = JSON.parse(new TextDecoder().decode(decrypted));
  } catch { return showError('Decryption failed — key mismatch or corrupted data.'); }

  // ── 4. Render chat ─────────────────────────────────────────────────────
  const messages = sessionData.messages || [];
  const ctx = sessionData.context || {};
  $model.textContent = ctx.model || 'unknown';
  $turns.textContent = String(ctx.turnCount || messages.filter(m => m.role === 'user').length);

  function extractText(msg) {
    if (typeof msg.content === 'string') return msg.content;
    if (Array.isArray(msg.content)) {
      return msg.content.filter(p => p.type === 'text').map(p => p.text).join('');
    }
    return '';
  }

  function renderMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    $messages.appendChild(div);
    scrollToBottom();
    return div;
  }

  for (const m of messages) {
    if (m.role === 'user' || m.role === 'assistant') {
      const text = extractText(m);
      if (text) renderMessage(m.role, text);
    }
  }

  showScreen($chat);
  scrollToBottom();

  // Handle iOS keyboard resize
  window.visualViewport?.addEventListener('resize', () => {
    scrollToBottom();
  });

  // ── 5. Send message ────────────────────────────────────────────────────
  let streaming = false;

  async function sendMessage() {
    const text = $input.value.trim();
    if (!text || streaming) return;

    messages.push({ role: 'user', content: text });
    renderMessage('user', text);
    $input.value = '';
    $input.style.height = 'auto';
    streaming = true;
    $send.disabled = true;
    $returnBtn.disabled = true;

    const bubble = renderMessage('assistant', '');
    bubble.classList.add('streaming');
    bubble.textContent = '…';
    let fullText = '';

    try {
      const apiMessages = messages
        .filter(m => m.role === 'user' || m.role === 'assistant')
        .map(m => ({ role: m.role, content: extractText(m) || m.content }));

      const resp = await fetch('/v1/proxy/anthropic/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: ctx.model || 'claude-sonnet-4-6',
          messages: apiMessages,
          max_tokens: 4096,
          stream: true
        })
      });

      if (!resp.ok) {
        const err = await resp.text();
        bubble.textContent = '[Error ' + resp.status + '] ' + err;
        bubble.classList.remove('streaming');
        streaming = false;
        $send.disabled = false;
        $returnBtn.disabled = false;
        return;
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (line.startsWith('data: ')) {
            const data = line.slice(6).trim();
            if (data === '[DONE]') continue;
            try {
              const event = JSON.parse(data);
              if (event.type === 'content_block_delta' && event.delta?.text) {
                fullText += event.delta.text;
                bubble.textContent = fullText;
                scrollToBottom();
              }
            } catch {}
          }
        }
      }
    } catch (e) {
      if (!fullText) bubble.textContent = '[Network error: ' + e.message + ']';
    }

    bubble.classList.remove('streaming');
    if (fullText) {
      messages.push({ role: 'assistant', content: fullText });
    }
    streaming = false;
    $send.disabled = false;
    $returnBtn.disabled = false;
    $turns.textContent = String(messages.filter(m => m.role === 'user').length);
    $input.focus();
  }

  $send.addEventListener('click', sendMessage);
  $input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  $input.addEventListener('input', () => {
    $input.style.height = 'auto';
    $input.style.height = Math.min($input.scrollHeight, 120) + 'px';
  });

  // ── 6. Return to desktop ───────────────────────────────────────────────
  $returnBtn.addEventListener('click', async () => {
    if (streaming) return;
    if (!confirm('Return this session to the desktop CLI?')) return;

    $returnBtn.disabled = true;
    $returnBtn.textContent = 'Returning…';

    try {
      const updated = {
        schemaVersion: sessionData.schemaVersion || '1.0',
        messages,
        context: { ...ctx, turnCount: messages.filter(m => m.role === 'user').length },
        timestamp: Date.now()
      };

      const payload = new TextEncoder().encode(JSON.stringify(updated));
      const nonce = crypto.getRandomValues(new Uint8Array(12));

      const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: nonce }, cryptoKey, payload);
      const encArray = new Uint8Array(encrypted);
      const ct = encArray.slice(0, encArray.length - 16);
      const tg = encArray.slice(encArray.length - 16);

      // btoa with chunking for large payloads
      function toBase64(bytes) {
        let binary = '';
        const chunk = 8192;
        for (let i = 0; i < bytes.length; i += chunk) {
          binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
        }
        return btoa(binary);
      }

      const returnBundle = {
        encryptedPayload: toBase64(ct),
        nonce: toBase64(nonce),
        tag: toBase64(tg),
        metadata: { schemaVersion: '1.0', timestamp: Date.now() }
      };

      const resp = await fetch('/v1/remote/sessions/' + token + '/return', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(returnBundle)
      });

      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      showScreen($returned);
    } catch (e) {
      $returnBtn.textContent = '↩ Return to Desktop';
      $returnBtn.disabled = false;
      alert('Failed to return session: ' + e.message);
    }
  });

  $input.focus();
})();
</script>
</body>
</html>
