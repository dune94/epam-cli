<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Messages Dashboard</title>
    <style>
        :root {
          --bg: #fbfafa;  --bg1: #ffffff;  --bg2: #f4f4f4;  --bg3: #eaeaea;
          --surface: #ffffff;  --surface2: #f4f4f4;  --surface3: #eaeaea;
          --border: #e0e0e0;  --border2: #cccccc;
          --text: #060606;  --text2: #4a4a4a;  --text3: #717171;  --text-muted: #717171;
          --teal: #0047ff;  --teal2: #0047ff;  --teal-dim: rgba(0,71,255,0.08);
          --accent: #0047ff;  --teal-glow: rgba(0,71,255,0.20);
          --violet: #8453d2;  --violet2: #8453d2;  --violet-dim: rgba(132,83,210,0.10);
          --green: #1a8f3f;  --green-dim: rgba(26,143,63,0.10);
          --amber: #c87a00;  --amber-dim: rgba(200,122,0,0.10);
          --red: #d93025;  --red-dim: rgba(217,48,37,0.08);
          --pink: #c4186e;  --pink-dim: rgba(196,24,110,0.08);
          --blue: #1a73e8;  --blue-dim: rgba(26,115,232,0.08);
          --orange: #d35400;  --orange-dim: rgba(211,84,0,0.08);
          --epam-gradient: linear-gradient(118.82deg, #0078c2 .5%, #0047ff 47.33%, #8453d2 76.12%);
          --epam-cyan: #00f6ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            background: var(--epam-gradient);
            border-bottom: 1px solid transparent;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        h1 {
            font-size: 18px;
            color: #fff;
            font-weight: 800;
        }

        .subtitle {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            margin-left: 16px;
        }

        .subtitle a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            transition: opacity .15s;
        }

        .subtitle a:hover {
            opacity: 1;
            color: #fff;
        }

        .container {
            padding: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .filters {
            background: var(--bg1);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .filter-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group label {
            font-size: 15px;
            color: var(--text3);
            font-weight: 600;
        }

        .filter-group select {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg2);
            color: var(--text);
            font-size: 15px;
        }

        .filter-group select:hover {
            border-color: var(--teal);
        }

        .messages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .message-card {
            background: var(--bg1);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            transition: border-color 0.2s;
        }

        .message-card:hover {
            border-color: var(--teal);
        }

        .message-card.priority-urgent {
            border-left: 3px solid var(--red);
        }

        .message-card.priority-high {
            border-left: 3px solid var(--amber);
        }

        .message-card.priority-normal {
            border-left: 3px solid var(--blue);
        }

        .message-card.priority-low {
            border-left: 3px solid var(--green);
        }

        .message-card.type-approval {
            background: var(--green-dim);
        }

        .message-card.type-review_feedback {
            background: var(--amber-dim);
        }

        .message-card.type-rejection {
            background: var(--red-dim);
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .message-meta {
            flex: 1;
        }

        .message-subject {
            font-size: 17px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }

        .message-from-to {
            font-size: 14px;
            color: var(--text3);
            margin-bottom: 3px;
        }

        .message-from-to strong {
            color: var(--teal);
        }

        .message-timestamp {
            font-size: 13px;
            color: var(--text3);
            font-family: monospace;
        }

        .message-badges {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            align-items: start;
        }

        .badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge.type {
            background: rgba(0,71,255,0.08);
            color: #0047ff;
        }

        .badge.type-approval {
            background: var(--green-dim);
            color: var(--green);
        }

        .badge.type-review_feedback {
            background: var(--amber-dim);
            color: var(--amber);
        }

        .badge.type-rejection {
            background: var(--red-dim);
            color: var(--red);
        }

        .badge.type-response {
            background: rgba(0,71,255,0.08);
            color: #0047ff;
        }

        .badge.priority-urgent {
            background: var(--red-dim);
            color: var(--red);
        }

        .badge.priority-high {
            background: var(--amber-dim);
            color: var(--amber);
        }

        .badge.status {
            background: var(--bg3);
            color: var(--text3);
        }

        .badge.status-read {
            background: var(--green-dim);
            color: var(--green);
        }

        .message-body {
            margin-bottom: 12px;
        }

        .message-text {
            line-height: 1.6;
            margin-bottom: 10px;
            color: var(--text2);
            font-size: 15px;
        }

        .message-data {
            background: var(--bg2);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
        }

        .message-data h4 {
            margin-bottom: 8px;
            color: var(--text3);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .issue-item {
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        .issue-item:last-child {
            border-bottom: none;
        }

        .severity-error {
            color: var(--red);
            font-weight: 600;
        }

        .severity-warning {
            color: var(--amber);
            font-weight: 600;
        }

        .severity-info {
            color: var(--blue);
            font-weight: 600;
        }

        .stats {
            background: var(--bg1);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }

        .stat-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 6px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--teal);
        }

        .stat-label {
            font-size: 14px;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--bg1);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .empty-state h2 {
            margin-bottom: 10px;
            color: var(--text3);
            font-size: 20px;
        }

        .empty-state p {
            color: var(--text3);
            font-size: 15px;
        }

        .auto-refresh {
            text-align: center;
            margin-top: 20px;
            color: var(--text3);
            font-size: 14px;
        }

        .section-title {
            font-size: 16px;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .source-badge {
            font-size: 9px; font-weight: 800;
            padding: 1px 5px; border-radius: 3px;
            letter-spacing: 0.4px; text-transform: uppercase;
        }
        .source-bus    { background:rgba(132,83,210,0.10); color:#8453d2; border:1px solid rgba(132,83,210,0.25); }
        .source-inbox  { background:rgba(0,71,255,0.08); color:#0047ff; border:1px solid rgba(0,71,255,0.2); }
        .source-outbox { background:rgba(26,143,63,0.10); color:#1a8f3f; border:1px solid rgba(26,143,63,0.25); }

        .story-link {
            font-family: monospace; font-size: 11px;
            background: rgba(0,71,255,0.08); color: #0047ff;
            border: 1px solid rgba(0,71,255,0.2);
            padding: 1px 6px; border-radius: 3px;
        }

        .no-bus-note {
            text-align: center; padding: 16px;
            color: var(--text3); font-size: 13px;
            background: var(--bg1); border: 1px solid var(--border);
            border-radius: 8px; margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <header style="background:var(--epam-gradient);border-bottom:1px solid transparent;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,0.08)">
        <div style="display:flex;align-items:center;gap:12px">
            <div style="width:34px;height:34px;background:rgba(255,255,255,0.2);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:17px">&#9993;</div>
            <div>
                <div style="font-size:18px;font-weight:800;color:#fff">EPAM CLI — Agent Messages</div>
                <div style="font-size:11px;color:rgba(255,255,255,0.7)">Team Lead Code Review &amp; Agent Communication</div>
            </div>
        </div>
        <nav style="display:flex;gap:10px;flex-wrap:wrap;font-size:11px">
            <a href="monitor.html" style="color:rgba(255,255,255,0.7);text-decoration:none">Monitor</a>
            <a href="prd-viewer.html" style="color:rgba(255,255,255,0.7);text-decoration:none">PRD Viewer</a>
            <a href="orchestration-plan.html" style="color:rgba(255,255,255,0.7);text-decoration:none">Plan</a>
            <a href="agents-orchestration.html" style="color:rgba(255,255,255,0.7);text-decoration:none">Orchestration</a>
            <a href="agent-profiles.html" style="color:rgba(255,255,255,0.7);text-decoration:none">Profiles</a>
            <a href="agent-messages.html" style="color:#fff;text-decoration:none;border-bottom:2px solid #fff;padding-bottom:2px">Messages</a>
            <a href="phase-cost-monitor.html" style="color:rgba(255,255,255,0.7);text-decoration:none">Costs</a>
        </nav>
    </header>
    <div class="container">

        <div class="stats" id="stats">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="total-messages">0</div>
                    <div class="stat-label">Total Messages</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="unread-messages">0</div>
                    <div class="stat-label">Unread Messages</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="approvals-count">0</div>
                    <div class="stat-label">Approvals</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="feedback-count">0</div>
                    <div class="stat-label">Feedback/Changes</div>
                </div>
            </div>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label>Agent:</label>
                <select id="filter-agent">
                    <option value="">All Agents</option>
                    <option value="backend-engineer">Backend Engineer</option>
                    <option value="frontend-engineer">Frontend Engineer</option>
                    <option value="devops-engineer">DevOps Engineer</option>
                    <option value="qa-engineer">QA Engineer</option>
                    <option value="db-architect">DB Architect</option>
                    <option value="pipeline-engineer">Pipeline Engineer</option>
                    <option value="docs-engineer">Docs Engineer</option>
                    <option value="unit-test-runner">Unit Test Runner</option>
                    <option value="review-agent">Review Agent</option>
                    <option value="mock-data-generator">Mock Data Generator</option>
                    <option value="agent-skill-assessment-agent">Skill Assessment</option>
                </select>

                <label>Type:</label>
                <select id="filter-type">
                    <option value="">All Types</option>
                    <option value="approval">Approval</option>
                    <option value="review_feedback">Review Feedback</option>
                    <option value="rejection">Rejection</option>
                    <option value="info">Info</option>
                    <option value="request">Request</option>
                    <option value="response">Response</option>
                    <option value="alert">Alert</option>
                    <option value="warning">Warning</option>
                    <option value="update">Update</option>
                </select>

                <label>Status:</label>
                <select id="filter-status">
                    <option value="">All Status</option>
                    <option value="sent">Sent</option>
                    <option value="new">New</option>
                    <option value="read">Read</option>
                    <option value="archived">Archived</option>
                </select>

                <label>Story:</label>
                <input id="filter-story" type="text" placeholder="Story ID…"
                    style="padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:14px;width:130px"
                    oninput="applyFilters()"/>
            </div>
        </div>

        <div id="messages-container">
            <div class="empty-state">
                <h2>Loading messages...</h2>
            </div>
        </div>

        <div class="auto-refresh">
            Auto-refreshing every 5 seconds
        </div>
    </div>

    <script>
        const AGENTS = [
            'typescript-engineer', 'agent-systems-engineer', 'billing-engineer',
            'cli-ux-engineer', 'test-engineer', 'team-lead-agent',
            'review-agent'
        ];
        let allMessages = [];

        function parseNdjson(text) {
            return (text||'').trim().split('\n')
                .filter(l => l.trim())
                .map(l => { try { return JSON.parse(l); } catch(e) { return null; } })
                .filter(Boolean);
        }

        async function fetchInboxMessages() {
            const messages = [];
            for (const agent of AGENTS) {
                try {
                    const res = await fetch(`logs/messages/inbox/${agent}/`);
                    if (!res.ok) continue;
                    const html = await res.text();
                    const doc  = new DOMParser().parseFromString(html, 'text/html');
                    for (const link of doc.querySelectorAll('a')) {
                        const href = link.getAttribute('href');
                        if (href && href.endsWith('.json')) {
                            try {
                                const msg = await fetch(`logs/messages/inbox/${agent}/${href}`).then(r => r.json());
                                msg._source = 'inbox';
                                messages.push(msg);
                            } catch(e) {}
                        }
                    }
                } catch(e) {}
            }
            return messages;
        }

        async function fetchOutboxMessages() {
            const messages = [];
            try {
                const res = await fetch('logs/messages/outbox/');
                if (!res.ok) return messages;
                const html = await res.text();
                const doc  = new DOMParser().parseFromString(html, 'text/html');
                for (const link of doc.querySelectorAll('a')) {
                    const href = link.getAttribute('href');
                    if (href && href.endsWith('.json')) {
                        try {
                            const msg = await fetch(`logs/messages/outbox/${href}`).then(r => r.json());
                            msg._source = 'outbox';
                            messages.push(msg);
                        } catch(e) {}
                    }
                }
            } catch(e) {}
            return messages;
        }

        async function fetchBusMessages() {
            try {
                const res = await fetch('logs/agent-messages.jsonl?t=' + Date.now());
                if (!res.ok) return [];
                return parseNdjson(await res.text()).map(m => ({ ...m, _source: 'bus' }));
            } catch(e) { return []; }
        }

        async function fetchMessages() {
            const [inbox, outbox, bus] = await Promise.all([
                fetchInboxMessages(),
                fetchOutboxMessages(),
                fetchBusMessages()
            ]);

            // Merge and deduplicate by message_id
            const seen = new Set();
            const all  = [];
            for (const msg of [...bus, ...outbox, ...inbox]) {
                const key = msg.message_id || JSON.stringify({ from: msg.from_agent, ts: msg.timestamp, subj: msg.subject });
                if (seen.has(key)) continue;
                seen.add(key);
                all.push(msg);
            }
            return all.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
        }

        function updateStats(messages) {
            document.getElementById('total-messages').textContent    = messages.length;
            document.getElementById('unread-messages').textContent   = messages.filter(m => m.status === 'new' || m.status === 'sent').length;
            document.getElementById('approvals-count').textContent   = messages.filter(m => m.type === 'approval').length;
            document.getElementById('feedback-count').textContent    = messages.filter(m => m.type === 'review_feedback' || m.type === 'rejection').length;
        }

        function sourceBadge(src) {
            if (src === 'bus')    return `<span class="source-badge source-bus">BUS</span>`;
            if (src === 'outbox') return `<span class="source-badge source-outbox">OUTBOX</span>`;
            return `<span class="source-badge source-inbox">INBOX</span>`;
        }

        function renderMessages(messages) {
            const container = document.getElementById('messages-container');
            if (!messages.length) {
                container.innerHTML = `
                    <div class="no-bus-note">ℹ️ Agent messages appear here during pipeline execution. Bus messages (hybrid mode only) are shown with a <span class="source-badge source-bus">BUS</span> badge.</div>
                    <div class="empty-state"><h2>No messages found</h2><p>Messages will appear here when agents communicate.</p></div>`;
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'messages-grid';

            for (const msg of messages) {
                const card = document.createElement('div');
                card.className = `message-card priority-${msg.priority || 'normal'} type-${msg.type}`;

                const timestamp = msg.timestamp ? new Date(msg.timestamp).toLocaleString() : '—';
                const storyId   = msg.body?.story_id || msg.story_id;
                const phaseId   = msg.body?.phase_id  || msg.phase_id;
                const bodyText  = msg.body?.text || (typeof msg.body === 'string' ? msg.body : '');

                let bodyHTML = bodyText ? `<p class="message-text">${bodyText}</p>` : '';
                if (msg.body?.data?.issues?.length) {
                    bodyHTML += '<div class="message-data"><h4>Issues Found:</h4>';
                    for (const issue of msg.body.data.issues) {
                        bodyHTML += `<div class="issue-item">
                            <span class="severity-${issue.severity}">[${issue.severity.toUpperCase()}]</span>
                            ${issue.message}
                        </div>`;
                    }
                    bodyHTML += '</div>';
                }

                card.innerHTML = `
                    <div class="message-header">
                        <div class="message-meta">
                            <div class="message-subject">${msg.subject || 'No Subject'}</div>
                            <div class="message-from-to">
                                <strong>From:</strong> ${msg.from_agent || '?'} → <strong>To:</strong> ${msg.to_agent || '?'}
                            </div>
                            ${storyId ? `<div class="message-from-to"><strong>Story:</strong> <span class="story-link">${storyId}</span></div>` : ''}
                            ${phaseId ? `<div class="message-from-to"><strong>Phase:</strong> ${phaseId}</div>` : ''}
                            <div class="message-timestamp">${timestamp}</div>
                        </div>
                        <div class="message-badges">
                            ${sourceBadge(msg._source)}
                            <span class="badge type type-${msg.type}">${(msg.type||'msg').replace('_', ' ')}</span>
                            ${msg.priority && msg.priority !== 'normal' ? `<span class="badge priority-${msg.priority}">${msg.priority}</span>` : ''}
                            <span class="badge status status-${msg.status}">${msg.status || '—'}</span>
                        </div>
                    </div>
                    <div class="message-body">${bodyHTML}</div>`;
                grid.appendChild(card);
            }

            container.innerHTML = '';
            container.appendChild(grid);
        }

        function applyFilters() {
            const agentFilter  = document.getElementById('filter-agent').value;
            const typeFilter   = document.getElementById('filter-type').value;
            const statusFilter = document.getElementById('filter-status').value;
            const storyFilter  = (document.getElementById('filter-story').value || '').trim().toLowerCase();

            let filtered = allMessages;
            if (agentFilter)  filtered = filtered.filter(m => m.to_agent === agentFilter || m.from_agent === agentFilter);
            if (typeFilter)   filtered = filtered.filter(m => m.type === typeFilter);
            if (statusFilter) filtered = filtered.filter(m => m.status === statusFilter);
            if (storyFilter)  filtered = filtered.filter(m => {
                const sid = (m.body?.story_id || m.story_id || '').toLowerCase();
                return sid.includes(storyFilter);
            });

            updateStats(filtered);
            renderMessages(filtered);
        }

        async function refresh() {
            try {
                allMessages = await fetchMessages();
                applyFilters();
            } catch(e) { console.error('Error refreshing messages:', e); }
        }

        // Event listeners
        ['filter-agent','filter-type','filter-status'].forEach(id =>
            document.getElementById(id).addEventListener('change', applyFilters));

        // Initial load and auto-refresh
        refresh();
        setInterval(refresh, 5000);
    </script>
</body>
</html>
