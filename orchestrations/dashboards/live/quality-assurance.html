<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>QA Gates — EPAM CLI</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #fbfafa;  --bg1: #ffffff;  --bg2: #f4f4f4;  --bg3: #eaeaea;
  --surface: #ffffff;  --surface2: #f4f4f4;  --surface3: #eaeaea;
  --border: #e0e0e0;  --border2: #cccccc;
  --text: #060606;  --text2: #4a4a4a;  --text3: #717171;  --text-muted: #717171;
  --teal: #0047ff;  --teal2: #0047ff;  --teal-dim: rgba(0,71,255,0.08);
  --accent: #0047ff;  --teal-glow: rgba(0,71,255,0.20);
  --violet: #8453d2;  --violet2: #8453d2;  --violet-dim: rgba(132,83,210,0.10);
  --green: #1a8f3f;  --green-dim: rgba(26,143,63,0.10);
  --amber: #c87a00;  --amber-dim: rgba(200,122,0,0.10);
  --red: #d93025;  --red-dim: rgba(217,48,37,0.08);
  --pink: #c4186e;  --pink-dim: rgba(196,24,110,0.08);
  --blue: #1a73e8;  --blue-dim: rgba(26,115,232,0.08);
  --orange: #d35400;  --orange-dim: rgba(211,84,0,0.08);
  --epam-gradient: linear-gradient(118.82deg, #0078c2 .5%, #0047ff 47.33%, #8453d2 76.12%);
  --epam-cyan: #00f6ff;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ── Header ── */
.header {
  background: var(--epam-gradient);
  border-bottom: none;
  padding: 16px 28px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.header-left { display: flex; align-items: center; gap: 13px; }
.header-icon {
  width: 36px; height: 36px;
  background: rgba(255,255,255,0.2);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.header-title {
  font-size: 19px; font-weight: 800;
  color: #fff; -webkit-text-fill-color: #fff;
  background: none; letter-spacing: -0.3px;
}
.header-sub { color: rgba(255,255,255,0.7); font-size: 11px; margin-top: 1px; letter-spacing: 0.3px; }
.header-meta { text-align: right; color: rgba(255,255,255,0.7); font-size: 11px; line-height: 1.8; }

/* ── Nav links ── */
.nav-links { font-size: 11px; display: flex; gap: 10px; flex-wrap: wrap; }
.nav-links a {
  color: #fff; text-decoration: none; opacity: .7;
  transition: opacity .15s;
}
.nav-links a:hover { opacity: 1; }
.nav-links a.active { border-bottom: 2px solid #fff; padding-bottom: 2px; }

/* ── Stats bar ── */
.stats-bar {
  background: var(--bg1);
  border-bottom: 1px solid var(--border);
  padding: 9px 28px;
  display: flex; gap: 24px; align-items: center; flex-wrap: wrap;
  min-height: 44px;
}
.stat-chip { display: flex; align-items: center; gap: 7px; font-size: 12px; }
.stat-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.stat-lbl  { color: var(--text3); }
.stat-num  { font-weight: 700; font-size: 15px; }

/* ── Controls ── */
.controls {
  background: var(--bg1); border-bottom: 1px solid var(--border);
  padding: 9px 28px;
  display: flex; gap: 9px; align-items: center; flex-wrap: wrap;
  position: sticky; top: 69px; z-index: 99;
}
.filter-group { display: flex; gap: 3px; }
.filter-btn {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 5px; color: var(--text3);
  padding: 5px 12px; font-size: 11px; font-weight: 700;
  cursor: pointer; transition: all 0.14s; letter-spacing: 0.4px;
}
.filter-btn:hover { border-color: var(--teal); color: var(--text); }
.filter-btn.active { background:rgba(0,71,255,0.08); border-color:#0047ff; color:#0047ff; }
.ctrl-btn {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 5px;
  color: var(--text3); padding: 5px 10px; font-size: 11px;
  cursor: pointer; transition: all 0.14s;
}
.ctrl-btn:hover { color: var(--text); border-color: var(--teal); }
.api-status { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; letter-spacing: 0.3px; }
.api-ok   { background:rgba(26,143,63,0.10); color:#1a8f3f; border:1px solid rgba(26,143,63,0.25); }
.api-err  { background:rgba(217,48,37,0.08); color:#d93025; border:1px solid rgba(217,48,37,0.25); }
.api-wait { background:var(--bg2); color:var(--text3); border:1px solid var(--border); }
.ctrl-gap { margin-left: auto; }

/* ── Content ── */
.content { padding: 18px 28px 52px; max-width: 1400px; margin: 0 auto; }

/* ── Phase section ── */
.phase-section { margin-bottom: 10px; }
.phase-header {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 14px;
  background: var(--bg1); border: 1px solid var(--border);
  border-radius: 8px; cursor: pointer; user-select: none;
  transition: background 0.12s, box-shadow 0.12s;
  border-left: 4px solid var(--ph-col, var(--teal));
}
.phase-header:hover { background: var(--bg2); box-shadow: 0 0 8px rgba(0,71,255,0.06); }
.phase-header.open  { border-radius: 8px 8px 0 0; }
.ph-chevron { font-size: 10px; color: var(--text3); transition: transform 0.2s; flex-shrink: 0; }
.ph-chevron.open { transform: rotate(90deg); }
.ph-name { font-weight: 700; font-size: 12px; color: var(--text); flex: 1; letter-spacing: 0.3px; }
.ph-verdict { font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 3px; letter-spacing: 0.5px; }
.ph-verdict.pass { background:rgba(26,143,63,0.10); color:#1a8f3f; border:1px solid rgba(26,143,63,0.25); }
.ph-verdict.fail { background:rgba(217,48,37,0.08); color:#d93025; border:1px solid rgba(217,48,37,0.25); }
.ph-verdict.warn { background:rgba(200,122,0,0.10); color:#c87a00; border:1px solid rgba(200,122,0,0.25); }
.ph-counts { font-size: 11px; color: var(--text3); white-space: nowrap; }

/* ── Agent results list ── */
.agent-list { border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; overflow: hidden; }

/* ── Agent card ── */
.agent-card { border-top: 1px solid rgba(0,71,255,0.06); }
.agent-card:first-child { border-top: none; }
.agent-row { display: flex; align-items: center; gap: 10px; padding: 9px 14px; cursor: pointer; transition: background 0.1s; }
.agent-row:hover { background: rgba(0,71,255,0.04); }
.agent-name {
  font-size: 11px; font-weight: 700; font-family: 'Courier New', monospace;
  background: rgba(0,71,255,0.08); color: #0047ff; border: 1px solid rgba(0,71,255,0.2);
  border-radius: 5px; padding: 3px 9px;
  min-width: 130px; flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  letter-spacing: 0.3px;
}
.agent-phase-label { flex: 1; font-size: 13px; color: var(--text); }
.badges { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
.badge { font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 3px; letter-spacing: 0.4px; white-space: nowrap; }
.b-pass    { background:rgba(26,143,63,0.10); color:#1a8f3f; border:1px solid rgba(26,143,63,0.25); }
.b-fail    { background:rgba(217,48,37,0.08); color:#d93025; border:1px solid rgba(217,48,37,0.25); }
.b-warn    { background:rgba(200,122,0,0.10); color:#c87a00; border:1px solid rgba(200,122,0,0.25); }
.b-skipped { background:var(--bg2); color:var(--text3); border:1px solid var(--border); }
.b-phase-a { background:rgba(0,71,255,0.08); color:#0047ff; border:1px solid rgba(0,71,255,0.2); }
.b-phase-b { background:rgba(132,83,210,0.10); color:#8453d2; border:1px solid rgba(132,83,210,0.25); }
.b-phase-c { background:rgba(196,24,110,0.08); color:#c4186e; border:1px solid rgba(196,24,110,0.25); }
.b-duration { background:var(--bg2); color:var(--text3); border:1px solid var(--border); }

.expand-icon { color: var(--text3); font-size: 10px; transition: transform 0.2s; flex-shrink: 0; }
.expand-icon.open { transform: rotate(90deg); color: var(--teal); }

/* ── Detail panel ── */
.agent-detail {
  border-top: 1px solid rgba(0,71,255,0.08);
  padding: 15px 18px 18px;
  background: var(--bg2);
  animation: sd 0.13s ease-out;
}
@keyframes sd { from{opacity:0;transform:translateY(-3px)} to{opacity:1;transform:translateY(0)} }
.detail-section { margin-bottom: 12px; }
.dl-t {
  font-size: 9px; font-weight: 800; letter-spacing: 1px;
  color: var(--teal); text-transform: uppercase;
  margin-bottom: 5px; margin-top: 10px;
  opacity: 0.8;
}
.dl-t:first-child { margin-top: 0; }
.findings-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.findings-table th { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); color: var(--text3); font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; }
.findings-table td { padding: 6px 8px; border-bottom: 1px solid rgba(0,0,0,0.04); vertical-align: top; }
.findings-table tr:last-child td { border-bottom: none; }
.sev-blocker { color: var(--red); font-weight: 700; }
.sev-major { color: var(--amber); font-weight: 700; }
.sev-minor { color: var(--text3); }
.file-ref { font-family: 'Courier New', monospace; font-size: 11px; color: var(--violet); }
.log-link { color: var(--teal); text-decoration: none; font-size: 11px; font-weight: 600; }
.log-link:hover { text-decoration: underline; }

/* ── Empty / Loading ── */
.empty-state { text-align: center; padding: 72px 32px; color: var(--text3); }
.empty-icon  { font-size: 42px; margin-bottom: 12px; }
.empty-text  { font-size: 14px; }
.loading-blk { text-align: center; padding: 80px; color: var(--text3); font-size: 14px; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 9px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #1a3050; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #0e7490; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-icon">🛡</div>
    <div>
      <div class="header-title">EPAM CLI QA Gates</div>
      <div class="header-sub">Testing Agent Verdicts · Phase Gate Quality Assurance</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
    <div class="header-meta" id="header-meta"></div>
    <div class="nav-links">
      <a href="monitor.html">Monitor</a>
      <a href="prd-viewer.html">PRD Viewer</a>
      <a href="specification.html">Spec Diff</a>
      <a href="orchestration-plan.html">Plan</a>
      <a href="agents-orchestration.html">Orchestration</a>
      <a href="pipeline-stages.html">Stages</a>
      <a href="agent-profiles.html">Profiles</a>
      <a href="agent-messages.html">Messages</a>
      <a href="phase-cost-monitor.html">Costs</a>
      <a href="quality-assurance.html" class="active">QA Gates</a>
      <a href="cpa-details.html">Estimation</a>
      <a href="epam-cli-guide.html">CLI Guide</a>
    </div>
  </div>
</div>

<div class="stats-bar" id="stats-bar">
  <div style="color:var(--text3);font-size:12px"><span class="spinner"></span>Loading…</div>
</div>

<div class="controls" id="controls" style="display:none">
  <div class="filter-group">
    <button class="filter-btn active" data-f="all"  onclick="setFilter('all')">ALL</button>
    <button class="filter-btn"        data-f="pass" onclick="setFilter('pass')">PASS</button>
    <button class="filter-btn"        data-f="fail" onclick="setFilter('fail')">FAIL</button>
    <button class="filter-btn"        data-f="warn" onclick="setFilter('warn')">WARN</button>
  </div>
  <div id="api-status-chip" class="api-status api-wait">DATA …</div>
  <div class="ctrl-gap"></div>
  <button class="ctrl-btn" onclick="expandAll()">⊞ Expand All</button>
  <button class="ctrl-btn" onclick="collapseAll()">⊟ Collapse All</button>
  <button class="ctrl-btn" onclick="loadData()" title="Reload">↺ Refresh</button>
</div>

<div class="content" id="content">
  <div class="loading-blk"><span class="spinner"></span>Loading testing gate data…</div>
</div>

<script>
const GATES_URL = 'testing-gates.jsonl';
const AGENT_META = {
  'sast-sentinel':    { phase: 'A', step: '4.2a', label: 'SAST — Static Analysis & Security' },
  'spec-validator':   { phase: 'A', step: '4.2b', label: 'Spec Compliance Validator' },
  'review-ranger':    { phase: 'B', step: '4.3a', label: 'Deep Diff Code Review' },
  'mutant-hunter':    { phase: 'B', step: '4.3b', label: 'Mutation Testing Analysis' },
  'fuzz-weaver':      { phase: 'C', step: '4.4a', label: 'Property-Based Fuzz Analysis' },
  'perf-sentinel':    { phase: 'C', step: '4.4b', label: 'Performance Regression Analysis' }
};
const PHASE_COLORS = [
  { border:'#0047ff', bg:'#f0f5ff' },
  { border:'#8453d2', bg:'#f5f0ff' },
  { border:'#1a73e8', bg:'#eef4ff' },
  { border:'#1a8f3f', bg:'#eef8f0' },
  { border:'#c87a00', bg:'#fff8ee' },
  { border:'#c4186e', bg:'#fff0f5' }
];

let gateEntries = [];
let filterMode = 'all';
let expandedAgents = new Set();
let collapsedPhases = new Set();

async function loadData() {
  document.getElementById('content').innerHTML =
    '<div class="loading-blk"><span class="spinner"></span>Loading testing-gates.jsonl…</div>';
  try {
    const res = await fetch(GATES_URL + '?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    gateEntries = text.trim().split('\n').filter(Boolean).map(line => {
      try { return JSON.parse(line); } catch(e) { return null; }
    }).filter(Boolean);
    setApiStatus('ok');
  } catch(e) {
    setApiStatus('err');
    document.getElementById('stats-bar').innerHTML = '';
    document.getElementById('content').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <div class="empty-text">No testing gate data available</div>
        <div style="margin-top:12px;color:var(--text3);font-size:12px">
          Run the orchestration pipeline to generate testing gate results.<br>
          Expected at <code style="background:var(--bg2);padding:2px 6px;border-radius:3px;font-size:11px">${esc(GATES_URL)}</code>
        </div>
      </div>`;
    document.getElementById('controls').style.display = 'flex';
    return;
  }

  renderStats();
  document.getElementById('controls').style.display = 'flex';
  renderContent();
}

function setApiStatus(state) {
  const el = document.getElementById('api-status-chip');
  if (!el) return;
  el.className = 'api-status ' + (state === 'ok' ? 'api-ok' : 'api-err');
  el.textContent = state === 'ok' ? '✓ DATA' : '✗ DATA';
}

function renderStats() {
  const total = gateEntries.length;
  const passed = gateEntries.filter(e => e.verdict === 'pass').length;
  const failed = gateEntries.filter(e => e.verdict === 'fail').length;
  const phases = [...new Set(gateEntries.map(e => e.phase_id))];
  const avgDuration = total ? Math.round(gateEntries.reduce((s,e) => s + (e.duration_ms || 0), 0) / total) : 0;
  const lastRun = total ? gateEntries[total - 1].timestamp : '—';

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-chip">
      <div class="stat-dot" style="background:var(--teal)"></div>
      <span class="stat-lbl">Gate Runs</span>
      <span class="stat-num" style="color:var(--teal)">${total}</span>
    </div>
    <div class="stat-chip">
      <div class="stat-dot" style="background:var(--green)"></div>
      <span class="stat-lbl">Passed</span>
      <span class="stat-num" style="color:var(--green)">${passed}</span>
    </div>
    <div class="stat-chip">
      <div class="stat-dot" style="background:var(--red)"></div>
      <span class="stat-lbl">Failed</span>
      <span class="stat-num" style="color:var(--red)">${failed}</span>
    </div>
    <div class="stat-chip">
      <div class="stat-dot" style="background:var(--violet)"></div>
      <span class="stat-lbl">Phases</span>
      <span class="stat-num" style="color:var(--violet)">${phases.length}</span>
    </div>
    <div class="stat-chip">
      <div class="stat-dot" style="background:var(--amber)"></div>
      <span class="stat-lbl">Avg Duration</span>
      <span class="stat-num" style="color:var(--amber)">${formatDuration(avgDuration)}</span>
    </div>
    <div class="stat-chip">
      <div class="stat-dot" style="background:#475569"></div>
      <span class="stat-lbl">Last Run</span>
      <span class="stat-num" style="font-size:11px;color:var(--text3)">${esc(lastRun)}</span>
    </div>`;
}

function renderContent() {
  const phases = [...new Set(gateEntries.map(e => e.phase_id))];
  let html = '', total = 0;

  phases.forEach((phaseId, idx) => {
    const entries = gateEntries.filter(e => e.phase_id === phaseId);
    const latest = entries[entries.length - 1];
    if (!latest) return;

    if (filterMode !== 'all' && latest.verdict !== filterMode) return;
    total++;

    const color = PHASE_COLORS[idx % PHASE_COLORS.length];
    const isCol = collapsedPhases.has(phaseId);
    const label = phaseId.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase());

    const agents = buildAgentResults(latest);
    const agentsHtml = isCol ? '' :
      `<div class="agent-list" style="background:${color.bg}">
         ${agents.map(a => renderAgentCard(a, phaseId)).join('')}
         <div style="padding:8px 14px;font-size:11px;color:var(--text3);border-top:1px solid rgba(0,71,255,0.06)">
           ${entries.length} gate run${entries.length !== 1 ? 's' : ''} recorded · Latest: ${esc(latest.timestamp)}
           · Duration: ${formatDuration(latest.duration_ms || 0)}
         </div>
       </div>`;

    html += `
<div class="phase-section">
  <div class="phase-header ${isCol?'':'open'}" style="--ph-col:${color.border}"
       onclick="togglePhase('${phaseId}')">
    <span class="ph-chevron ${isCol?'':'open'}">▶</span>
    <span class="ph-name">${esc(label)}</span>
    <span class="ph-verdict ${latest.verdict}">${latest.verdict.toUpperCase()}</span>
    <span class="ph-counts">${agents.filter(a=>a.verdict==='pass').length}/${agents.length} agents passed</span>
  </div>
  ${agentsHtml}
</div>`;
  });

  document.getElementById('content').innerHTML = total ? html : `
    <div class="empty-state">
      <div class="empty-icon">🔍</div>
      <div class="empty-text">No gate results match the current filter</div>
    </div>`;
}

function buildAgentResults(entry) {
  const agents = [];
  const agentKeys = [
    { key: 'sast_exit', name: 'sast-sentinel' },
    { key: 'spec_exit', name: 'spec-validator' },
    { key: 'review_exit', name: 'review-ranger' },
    { key: 'mutant_exit', name: 'mutant-hunter' },
    { key: 'fuzz_exit', name: 'fuzz-weaver' },
    { key: 'perf_exit', name: 'perf-sentinel' }
  ];

  agentKeys.forEach(({ key, name }) => {
    if (entry[key] !== undefined) {
      const meta = AGENT_META[name] || { phase: '?', step: '?', label: name };
      const exitCode = entry[key];
      let verdict = exitCode === 0 ? 'pass' : 'fail';
      agents.push({ name, exitCode, verdict, meta, phaseId: entry.phase_id });
    }
  });

  return agents;
}

function renderAgentCard(agent, phaseId) {
  const expanded = expandedAgents.has(phaseId + '/' + agent.name);
  const phaseBadge = agent.meta.phase === 'A' ? 'b-phase-a'
    : agent.meta.phase === 'B' ? 'b-phase-b' : 'b-phase-c';

  return `
<div class="agent-card">
  <div class="agent-row" onclick="toggleAgent('${phaseId}/${agent.name}')">
    <span class="agent-name">${esc(agent.name)}</span>
    <span class="agent-phase-label">${esc(agent.meta.label)}</span>
    <div class="badges">
      <span class="badge ${phaseBadge}">PHASE ${agent.meta.phase}</span>
      <span class="badge b-${agent.verdict}">${agent.verdict.toUpperCase()}</span>
      <span class="badge b-skipped">Step ${agent.meta.step}</span>
    </div>
    <span class="expand-icon ${expanded?'open':''}">▶</span>
  </div>
  ${expanded ? renderAgentDetail(agent) : ''}
</div>`;
}

function renderAgentDetail(agent) {
  const logFile = agent.name + '-' + agent.phaseId + '.log';
  return `
<div class="agent-detail">
  <div class="dl-t">Agent Summary</div>
  <table class="findings-table">
    <tr><th style="width:120px">Field</th><th>Value</th></tr>
    <tr><td>Agent</td><td><code>${esc(agent.name)}</code></td></tr>
    <tr><td>Gate Phase</td><td>Phase ${esc(agent.meta.phase)} (Step ${esc(agent.meta.step)})</td></tr>
    <tr><td>Exit Code</td><td>${agent.exitCode === 0
      ? '<span style="color:var(--green)">0 (success)</span>'
      : '<span style="color:var(--red)">' + agent.exitCode + ' (failure)</span>'}</td></tr>
    <tr><td>Verdict</td><td><span class="badge b-${agent.verdict}">${agent.verdict.toUpperCase()}</span></td></tr>
    <tr><td>Log File</td><td><a class="log-link" href="../logs/${esc(logFile)}" target="_blank">${esc(logFile)}</a></td></tr>
  </table>
  <div class="dl-t" style="margin-top:12px">Agent Role</div>
  <div style="font-size:12px;color:var(--text2);line-height:1.6">${esc(agent.meta.label)}</div>
</div>`;
}

/* ── Interactions ── */
function toggleAgent(key) {
  expandedAgents.has(key) ? expandedAgents.delete(key) : expandedAgents.add(key);
  renderContent();
}
function togglePhase(id) {
  collapsedPhases.has(id) ? collapsedPhases.delete(id) : collapsedPhases.add(id);
  renderContent();
}
function setFilter(mode) {
  filterMode = mode;
  document.querySelectorAll('.filter-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.f === mode));
  renderContent();
}
function expandAll() {
  gateEntries.forEach(e => {
    Object.keys(AGENT_META).forEach(name => {
      expandedAgents.add(e.phase_id + '/' + name);
    });
  });
  renderContent();
}
function collapseAll() { expandedAgents.clear(); renderContent(); }

/* ── Helpers ── */
function formatDuration(ms) {
  if (!ms) return '—';
  if (ms < 1000) return ms + 'ms';
  const sec = Math.round(ms / 1000);
  if (sec < 60) return sec + 's';
  return Math.floor(sec / 60) + 'm ' + (sec % 60) + 's';
}
function esc(v) {
  if (v == null) return '';
  return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Auto-refresh every 15s
setInterval(() => {
  if (!gateEntries.length) return;
  fetch(GATES_URL + '?_=' + Date.now())
    .then(r => r.ok ? r.text() : null)
    .then(text => {
      if (!text) return;
      const newEntries = text.trim().split('\n').filter(Boolean).map(line => {
        try { return JSON.parse(line); } catch(e) { return null; }
      }).filter(Boolean);
      if (newEntries.length !== gateEntries.length) {
        gateEntries = newEntries;
        setApiStatus('ok');
        renderStats();
        renderContent();
      }
    })
    .catch(() => setApiStatus('err'));
}, 15000);

loadData();
</script>
<script src="runtime/build-info.js"></script>
</body>
</html>
