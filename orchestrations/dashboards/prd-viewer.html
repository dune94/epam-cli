<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRD Viewer — Shadow Play</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #050a0f;
  --bg1:    #0a1420;
  --bg2:    #0f1e30;
  --bg3:    #142540;
  --border: #1a3050;
  --text:   #e2f0f8;
  --text2:  #8ab4cc;
  --text3:  #4a7090;
  --teal:   #06b6d4;
  --violet: #7c3aed;
  --teal2:  #22d3ee;
  --violet2:#a78bfa;
  --accent: #06b6d4;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ── Glitch scanline overlay ── */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(6,182,212,0.02) 2px, rgba(6,182,212,0.02) 4px
  );
  pointer-events: none; z-index: 9999;
}

/* ── Header ── */
.header {
  background: linear-gradient(135deg, #05101e 0%, #0a0820 100%);
  border-bottom: 1px solid #1a3050;
  padding: 16px 28px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 4px 24px rgba(6,182,212,0.08);
}
.header-left { display: flex; align-items: center; gap: 13px; }
.header-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, #06b6d4, #7c3aed);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
  box-shadow: 0 0 12px rgba(6,182,212,0.4);
}
.header-title {
  font-size: 19px; font-weight: 800;
  background: linear-gradient(90deg, #06b6d4 0%, #a78bfa 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; letter-spacing: -0.3px;
}
.header-sub { color: var(--text3); font-size: 11px; margin-top: 1px; letter-spacing: 0.3px; }
.header-meta { text-align: right; color: var(--text3); font-size: 11px; line-height: 1.8; }

/* ── Nav links ── */
.nav-links { font-size: 11px; display: flex; gap: 10px; flex-wrap: wrap; }
.nav-links a {
  color: var(--teal); text-decoration: none; opacity: .6;
  transition: opacity .15s, text-shadow .15s;
}
.nav-links a:hover { opacity: 1; text-shadow: 0 0 8px rgba(6,182,212,0.6); }

/* ── Stats bar ── */
.stats-bar {
  background: var(--bg1);
  border-bottom: 1px solid var(--border);
  padding: 9px 28px;
  display: flex; gap: 24px; align-items: center; flex-wrap: wrap;
  min-height: 44px;
}
.stat-chip { display: flex; align-items: center; gap: 7px; font-size: 12px; }
.stat-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.stat-lbl  { color: var(--text3); }
.stat-num  { font-weight: 700; font-size: 15px; }
.progress-wrap { margin-left: auto; display: flex; align-items: center; gap: 9px; }
.progress-bar  {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 4px; width: 140px; height: 7px; overflow: hidden;
}
.progress-fill { background: linear-gradient(90deg,#06b6d4,#7c3aed); height: 100%; border-radius: 4px; transition: width 0.4s; }
.progress-lbl  { color: var(--text3); font-size: 11px; white-space: nowrap; }

/* ── Controls ── */
.controls {
  background: var(--bg1); border-bottom: 1px solid var(--border);
  padding: 9px 28px;
  display: flex; gap: 9px; align-items: center; flex-wrap: wrap;
  position: sticky; top: 69px; z-index: 99;
}
.search-wrap { position: relative; }
.search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 12px; pointer-events: none; }
.search-input {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text);
  padding: 6px 12px 6px 28px; font-size: 12px; width: 240px; outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--teal); box-shadow: 0 0 0 2px rgba(6,182,212,0.12); }
.search-input::placeholder { color: var(--text3); }

.filter-group { display: flex; gap: 3px; }
.filter-btn {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 5px; color: var(--text3);
  padding: 5px 12px; font-size: 11px; font-weight: 700;
  cursor: pointer; transition: all 0.14s; letter-spacing: 0.4px;
}
.filter-btn:hover { border-color: var(--teal); color: var(--text); }
.filter-btn.active.fp { background:#0a2030; border-color:#0e7490; color:#22d3ee; }
.filter-btn.active.fa { background:#120a28; border-color:#5b21b6; color:#a78bfa; }
.filter-btn.active.fc { background:#022c22; border-color:#065f46; color:#34d399; }

.ctrl-btn {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 5px;
  color: var(--text3); padding: 5px 10px; font-size: 11px;
  cursor: pointer; transition: all 0.14s;
}
.ctrl-btn:hover { color: var(--text); border-color: var(--teal); }
.api-status { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; letter-spacing: 0.3px; }
.api-ok   { background:#022c22; color:#10b981; border:1px solid #065f46; }
.api-err  { background:#3b0a0a; color:#ef4444; border:1px solid #7f1d1d; }
.api-wait { background:#1a1a1a; color:#94a3b8; border:1px solid #334155; }
.ctrl-gap { margin-left: auto; }

/* ── Content ── */
.content { padding: 18px 28px 52px; max-width: 1400px; margin: 0 auto; }

/* ── Phase section ── */
.phase-section { margin-bottom: 10px; }
.phase-header {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 14px;
  background: var(--bg1); border: 1px solid var(--border);
  border-radius: 8px; cursor: pointer; user-select: none;
  transition: background 0.12s, box-shadow 0.12s;
  border-left: 4px solid var(--ph-col, #06b6d4);
}
.phase-header:hover { background: var(--bg2); box-shadow: 0 0 8px rgba(6,182,212,0.06); }
.phase-header.open  { border-radius: 8px 8px 0 0; }
.ph-chevron { font-size: 10px; color: var(--text3); transition: transform 0.2s; flex-shrink: 0; }
.ph-chevron.open { transform: rotate(90deg); }
.ph-name { font-weight: 700; font-size: 12px; color: var(--text); flex: 1; letter-spacing: 0.3px; }
.ph-mode { font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 3px; letter-spacing: 0.5px; }
.ph-mode.hybrid { background:#1a0a30; color:#a78bfa; border:1px solid #5b21b6; }
.ph-mode.bash   { background:#051828; color:#22d3ee; border:1px solid #0e7490; }
.ph-counts { font-size: 11px; color: var(--text3); white-space: nowrap; }
.ph-p { color:#22d3ee; font-weight:600; }
.ph-d { color:#10b981; font-weight:600; }

/* ── Stories list ── */
.stories-list { border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; overflow: hidden; }

/* ── Story card ── */
.story-card { border-top: 1px solid rgba(6,182,212,0.06); }
.story-card:first-child { border-top: none; }
.story-row { display: flex; align-items: center; gap: 10px; padding: 9px 14px; cursor: pointer; transition: background 0.1s; }
.story-row:hover { background: rgba(6,182,212,0.04); }
.story-id {
  font-size: 11px; font-weight: 700; font-family: 'Courier New', monospace;
  background: #051828; color: #22d3ee; border: 1px solid #0e7490;
  border-radius: 5px; padding: 3px 9px;
  min-width: 78px; flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  letter-spacing: 0.3px;
  box-shadow: 0 0 6px rgba(6,182,212,0.1);
}
.story-title { flex: 1; font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.badges { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }

/* Badges */
.badge { font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 3px; letter-spacing: 0.4px; white-space: nowrap; }
.bs-pending     { background:#051828; color:#22d3ee; border:1px solid #0e7490; }
.bs-completed   { background:#022c22; color:#10b981; border:1px solid #065f46; }
.bs-failed      { background:#3b0a0a; color:#ef4444; border:1px solid #7f1d1d; }
.bs-in_progress { background:#1a0a30; color:#a78bfa; border:1px solid #5b21b6; }
.be-low    { background:#042f2e; color:#2dd4bf; border:1px solid #0f766e; }
.be-medium { background:#120a28; color:#a78bfa; border:1px solid #5b21b6; }
.be-high   { background:#1c0a00; color:#fb923c; border:1px solid #9a3412; }
.bl-haiku    { background:#042f2e; color:#2dd4bf; border:1px solid #0f766e; }
.bl-sonnet   { background:#120a28; color:#a78bfa; border:1px solid #5b21b6; }
.bl-opus     { background:#1a0530; color:#c084fc; border:1px solid #7c3aed; box-shadow:0 0 5px rgba(124,58,237,0.2); }
.bl-opencode { background:#032b1a; color:#34d399; border:1px solid #059669; }
.bl-codex    { background:#2e0a1e; color:#f472b6; border:1px solid #be185d; }
.bt-unit   { background:#0a2e1e; color:#34d399; border:1px solid #059669; }
.bt-e2e    { background:#2e1065; color:#c084fc; border:1px solid #7c3aed; }
.bp-claude   { background:#1a0530; color:#c084fc; border:1px solid #7c3aed; box-shadow:0 0 5px rgba(124,58,237,0.2); }
.bp-opencode { background:#032b1a; color:#34d399; border:1px solid #059669; }
.bp-codex    { background:#2e0a1e; color:#f472b6; border:1px solid #be185d; }

.expand-icon { color: var(--text3); font-size: 10px; transition: transform 0.2s; flex-shrink: 0; }
.expand-icon.open { transform: rotate(90deg); color: var(--teal); }

/* ── Detail panel ── */
.story-detail {
  border-top: 1px solid rgba(6,182,212,0.08);
  padding: 15px 18px 18px;
  animation: sd 0.13s ease-out;
}
@keyframes sd { from{opacity:0;transform:translateY(-3px)} to{opacity:1;transform:translateY(0)} }
.detail-grid { display: grid; grid-template-columns: 1fr 280px; gap: 22px; }
@media (max-width: 820px) { .detail-grid { grid-template-columns: 1fr; } }

.dl-t {
  font-size: 9px; font-weight: 800; letter-spacing: 1px;
  color: var(--teal); text-transform: uppercase;
  margin-bottom: 5px; margin-top: 13px;
  opacity: 0.8;
}
.dl-t:first-child { margin-top: 0; }
.dl-v  { font-size: 12px; color: var(--text2); line-height: 1.65; }
.dl-vt { color: var(--text); }

.ac-list { list-style: none; padding: 0; }
.ac-item { display: flex; gap: 7px; padding: 2px 0; font-size: 12px; color: var(--text2); align-items: flex-start; line-height: 1.5; }
.ac-ck { color: var(--teal); flex-shrink: 0; margin-top: 1px; font-size: 10px; }

.meta-tbl { width: 100%; border-collapse: collapse; }
.meta-tbl td { padding: 3px 0; font-size: 11px; vertical-align: top; }
.meta-tbl .mk { color: var(--text3); font-weight: 700; width: 95px; padding-right: 9px; text-transform: uppercase; font-size: 9px; letter-spacing: 0.4px; }
.meta-tbl .mv { color: var(--text2); }

.dep-chip {
  display: inline-block; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 3px; padding: 1px 6px; font-size: 10px;
  font-family: 'Courier New', monospace; color: var(--teal2);
  margin: 2px 3px 2px 0;
}

/* Tech notes */
.tn-tbl { width: 100%; border-collapse: collapse; }
.tn-tbl td { padding: 3px 0; font-size: 11px; vertical-align: top; }
.tnk { color: var(--text3); font-weight: 700; width: 120px; padding-right: 10px; text-transform: uppercase; font-size: 9px; letter-spacing: 0.4px; white-space: nowrap; }
.tnv { color: var(--text2); line-height: 1.6; }
.tn-list { list-style: none; padding: 0; margin: 2px 0; }
.tn-list li { padding: 1px 0; font-size: 11px; color: var(--text2); }
.tn-list li::before { content: '▸ '; color: var(--teal); font-size: 9px; }
.tn-nested {
  background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
  padding: 6px 9px; font-size: 10px; font-family: 'Courier New', monospace;
  color: var(--text2); white-space: pre-wrap; word-break: break-word;
  max-height: 120px; overflow: auto;
}
.tn-wrap { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 13px; margin-top: 5px; }

/* Cost actuals panel */
.actuals-bar {
  display: flex; gap: 16px; flex-wrap: wrap;
  background: var(--bg3); border: 1px solid var(--border);
  border-left: 3px solid var(--teal);
  border-radius: 0 5px 5px 0;
  padding: 7px 12px; margin-top: 8px; font-size: 11px;
}
.act-item { display: flex; flex-direction: column; gap: 2px; }
.act-lbl  { color: var(--text3); font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; }
.act-val  { color: var(--teal2); font-weight: 700; }

/* ── Empty / Loading ── */
.empty-state { text-align: center; padding: 72px 32px; color: var(--text3); }
.empty-icon  { font-size: 42px; margin-bottom: 12px; }
.empty-text  { font-size: 14px; }
.api-error-state { background: #1a0a0a; border: 1px solid #3b0a0a; border-radius: 8px; padding: 28px 24px; text-align: center; }
.api-error-state h3 { color: #ef4444; margin-bottom: 10px; font-size: 15px; }
.api-error-state p  { color: #94a3b8; font-size: 12px; line-height: 1.6; }
.api-error-state code { background: #0f1e30; border-radius: 4px; padding: 2px 6px; font-family: monospace; font-size: 11px; color: #22d3ee; }
.loading-blk { text-align: center; padding: 80px; color: var(--text3); font-size: 14px; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 9px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #1a3050; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #0e7490; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-icon">👁</div>
    <div>
      <div class="header-title">Shadow Play PRD</div>
      <div class="header-sub">Intelligence Economy Extraction Sim · Agent Orchestration Dashboard</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
    <div class="header-meta" id="header-meta"></div>
    <div class="nav-links">
      <a href="shadow-play-monitor.html">SP Monitor</a>
      <a href="shadow-play-phase-cost-monitor.html">SP Costs</a>
      <a href="shadow-play-agent-profiles.html">SP Profiles</a>
      <a href="shadow-play-game-plan.html">SP Plan</a>
      <span style="opacity:0.2;margin:0 2px">·</span>
      <a href="monitor.html">Monitor</a>
      <a href="prd-viewer.html">Fitnessie PRD</a>
      <a href="phase-cost-monitor.html">Costs</a>
      <a href="phase-process.html">Graph</a>
    </div>
  </div>
</div>

<div class="stats-bar" id="stats-bar">
  <div style="color:var(--text3);font-size:12px"><span class="spinner"></span>Loading…</div>
</div>

<div class="controls" id="controls" style="display:none">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search-input" type="text" placeholder="Search ID or title…" autocomplete="off"/>
  </div>
  <div class="filter-group">
    <button class="filter-btn fp"        data-f="pending"   onclick="setFilter('pending')">PENDING</button>
    <button class="filter-btn fa active" data-f="all"       onclick="setFilter('all')">ALL</button>
    <button class="filter-btn fc"        data-f="completed" onclick="setFilter('completed')">COMPLETED</button>
  </div>
  <div id="api-status-chip" class="api-status api-wait">API …</div>
  <div class="ctrl-gap"></div>
  <button class="ctrl-btn" onclick="expandAll()">⊞ Expand All</button>
  <button class="ctrl-btn" onclick="collapseAll()">⊟ Collapse All</button>
  <button class="ctrl-btn" onclick="loadPrd()" title="Reload from API">↺ Refresh</button>
</div>

<div class="content" id="content">
  <div class="loading-blk"><span class="spinner"></span>Connecting to shadow-play-api…</div>
</div>

<script>
// API base — try localhost:8093 by default; override via ?api= query param
const API_BASE = (() => {
  const p = new URLSearchParams(location.search).get('api');
  return p || 'http://localhost:8093';
})();

// Phase colour palette — Glitch-Brutalism: teal/cyan/violet/indigo/blue/amber
const PHASE_COLORS = [
  { border:'#06b6d4', listBg:'#030f18', detailBg:'#04141f' }, // teal
  { border:'#7c3aed', listBg:'#0a0520', detailBg:'#0d0828' }, // violet
  { border:'#2563eb', listBg:'#050e20', detailBg:'#071228' }, // blue
  { border:'#059669', listBg:'#031410', detailBg:'#041a14' }, // green
  { border:'#d97706', listBg:'#180e02', detailBg:'#1e1202' }, // amber
  { border:'#db2777', listBg:'#180412', detailBg:'#1e0618' }, // pink
];

// Model lookup by model field (shadow-play uses exact model IDs)
const MODEL_INFO = {
  'claude-haiku-4-5':    { label:'HAIKU',  cls:'haiku',  turns:'10'        },
  'claude-haiku-4-5-20251001': { label:'HAIKU', cls:'haiku', turns:'10'   },
  'claude-sonnet-4-6':   { label:'SONNET', cls:'sonnet', turns:'30'        },
  'claude-opus-4-6':     { label:'OPUS',   cls:'opus',   turns:'unlimited' },
};
const EFFORT_INFO = {
  low:    { label:'HAIKU',  cls:'haiku',  turns:'10'        },
  medium: { label:'SONNET', cls:'sonnet', turns:'30'        },
  high:   { label:'OPUS',   cls:'opus',   turns:'unlimited' },
};

function modelInfo(story) {
  // For non-Claude providers, the .model field is irrelevant — use provider as the model display
  const provider = (story.aiProvider || '').toLowerCase();
  if (provider === 'opencode') return { label:'OPENCODE', cls:'opencode', turns:'—' };
  if (provider === 'codex')    return { label:'CODEX',    cls:'codex',   turns:'—' };
  // Claude providers — look up by exact model ID, fall back to effort
  if (story.model && MODEL_INFO[story.model]) return MODEL_INFO[story.model];
  const effort = (story.effort||'medium').toLowerCase();
  return EFFORT_INFO[effort] || EFFORT_INFO.medium;
}

let prd = null, phaseOrder = [], storyMap = {}, storyPhaseMap = {};
let filterMode = 'all', searchQuery = '';
let expandedStories = new Set(), collapsedPhases = new Set();

// ── Load ──────────────────────────────────────────────────────────────────────

async function loadPrd() {
  document.getElementById('content').innerHTML =
    '<div class="loading-blk"><span class="spinner"></span>Fetching from shadow-play-api…</div>';

  try {
    const res = await fetch(API_BASE + '/api/prd?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status + ' from ' + API_BASE + '/api/prd');
    prd = await res.json();
    setApiStatus('ok');
  } catch(e) {
    setApiStatus('err');
    document.getElementById('stats-bar').innerHTML = '';
    document.getElementById('content').innerHTML = `
      <div class="api-error-state">
        <h3>Cannot reach shadow-play-api</h3>
        <p>Expected at <code>${API_BASE}/api/prd</code></p>
        <p style="margin-top:10px">Start it with:</p>
        <p><code>docker compose up shadow-play-api</code></p>
        <p style="margin-top:10px;font-size:11px;color:#64748b">
          Or load-prd.sh first:<br>
          <code>bash shadow-play/db/scripts/load-prd.sh</code>
        </p>
        <p style="margin-top:14px;font-size:11px;color:#64748b">
          Error: ${esc(e.message)}
        </p>
      </div>`;
    document.getElementById('controls').style.display = 'flex';
    return;
  }

  // Use server-provided phaseOrder (display_order from DB) if available,
  // otherwise fall back to Object.keys which is alphabetical
  phaseOrder = prd.phaseOrder && prd.phaseOrder.length
    ? prd.phaseOrder
    : Object.keys(prd.implementationOrder || {});
  storyMap = {}; storyPhaseMap = {};
  (prd.stories || []).forEach(s => { storyMap[s.id] = s; });
  phaseOrder.forEach(ph => {
    (prd.implementationOrder[ph] || []).forEach(id => { storyPhaseMap[id] = ph; });
  });

  renderStats();
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('header-meta').innerHTML =
    `<div>v${esc(prd.version||'—')}</div><div>Updated: ${esc(prd.lastUpdated||'—')}</div>`;
  renderContent();
}

function setApiStatus(state) {
  const el = document.getElementById('api-status-chip');
  if (!el) return;
  if (state === 'ok') {
    el.className = 'api-status api-ok';
    el.textContent = '✓ API';
  } else {
    el.className = 'api-status api-err';
    el.textContent = '✗ API';
  }
}

// ── Stats ─────────────────────────────────────────────────────────────────────

function renderStats() {
  const all  = prd.stories || [];
  const done = all.filter(isDone).length;
  const pct  = all.length ? (done / all.length * 100).toFixed(0) : 0;
  const totalCost  = all.reduce((s,x) => s + (x.estimatedCost||0), 0);
  const actualCost = all.reduce((s,x) => s + (x.actualCost||0), 0);
  const totalHours = prd.totalEstimatedHours || 0;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-chip">
      <div class="stat-dot" style="background:#06b6d4"></div>
      <span class="stat-lbl">Phases</span>
      <span class="stat-num" style="color:#22d3ee">${phaseOrder.length}</span>
    </div>
    <div class="stat-chip">
      <div class="stat-dot" style="background:#475569"></div>
      <span class="stat-lbl">Stories</span>
      <span class="stat-num">${all.length}</span>
    </div>
    <div class="stat-chip">
      <div class="stat-dot" style="background:#22d3ee"></div>
      <span class="stat-lbl">Pending</span>
      <span class="stat-num" style="color:#22d3ee">${all.length - done}</span>
    </div>
    <div class="stat-chip">
      <div class="stat-dot" style="background:#10b981"></div>
      <span class="stat-lbl">Completed</span>
      <span class="stat-num" style="color:#10b981">${done}</span>
    </div>
    <div class="stat-chip">
      <div class="stat-dot" style="background:#7c3aed"></div>
      <span class="stat-lbl">Est. Hours</span>
      <span class="stat-num" style="color:#a78bfa">${totalHours}h</span>
    </div>
    <div class="stat-chip">
      <div class="stat-dot" style="background:#d97706"></div>
      <span class="stat-lbl">Est. Cost</span>
      <span class="stat-num" style="color:#fbbf24">$${totalCost.toFixed(0)}</span>
    </div>
    ${actualCost > 0 ? `
    <div class="stat-chip">
      <div class="stat-dot" style="background:#10b981"></div>
      <span class="stat-lbl">Actual Cost</span>
      <span class="stat-num" style="color:#10b981">$${actualCost.toFixed(2)}</span>
    </div>` : ''}
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span class="progress-lbl">${pct}% complete</span>
    </div>`;
}

// ── Content ───────────────────────────────────────────────────────────────────

function renderContent() {
  const q = searchQuery.toLowerCase();
  let html = '', total = 0;

  phaseOrder.forEach((phaseId, idx) => {
    const ids     = prd.implementationOrder[phaseId] || [];
    const stories = ids.map(id => storyMap[id]).filter(Boolean);
    const color   = PHASE_COLORS[idx % PHASE_COLORS.length];

    const filtered = stories.filter(s => {
      const done = isDone(s);
      if (filterMode === 'pending'   &&  done) return false;
      if (filterMode === 'completed' && !done) return false;
      if (q && !(s.id + ' ' + s.title + ' ' + (s.agentRole||'')).toLowerCase().includes(q)) return false;
      return true;
    });
    if (!filtered.length) return;
    total += filtered.length;

    const isCol  = collapsedPhases.has(phaseId);
    const omode  = prd.phasesConfig?.[phaseId]?.orchestrationMode ?? null;
    const pendCt = filtered.filter(s => !isDone(s)).length;
    const doneCt = filtered.filter(s =>  isDone(s)).length;
    const label  = phaseId.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase());
    const modeBdg = omode === 'hybrid'
      ? `<span class="ph-mode hybrid">HYBRID</span>`
      : omode === 'bash' ? `<span class="ph-mode bash">BASH</span>` : '';

    const ctParts = [];
    if (pendCt) ctParts.push(`<span class="ph-p">${pendCt} pending</span>`);
    if (doneCt) ctParts.push(`<span class="ph-d">${doneCt} done</span>`);

    const cardsHtml = isCol ? '' :
      `<div class="stories-list" style="background:${color.listBg}">
         ${filtered.map(s => renderStoryCard(s, color)).join('')}
       </div>`;

    html += `
<div class="phase-section">
  <div class="phase-header ${isCol?'':'open'}" style="--ph-col:${color.border}"
       onclick="togglePhase('${phaseId}')">
    <span class="ph-chevron ${isCol?'':'open'}">▶</span>
    <span class="ph-name">${esc(label)}</span>
    ${modeBdg}
    <span class="ph-counts">${ctParts.join(' · ')}</span>
  </div>
  ${cardsHtml}
</div>`;
  });

  document.getElementById('content').innerHTML = total ? html : `
    <div class="empty-state">
      <div class="empty-icon">🔍</div>
      <div class="empty-text">No stories match the current filter</div>
    </div>`;
}

// ── Story card ────────────────────────────────────────────────────────────────

function providerBadge(s) {
  const raw = (s.aiProvider || 'claude-sonnet').toLowerCase();
  // Provider = platform, not model — both claude-opus and claude-sonnet → CLAUDE
  const isClaud = raw.startsWith('claude');
  const cls = isClaud ? 'bp-claude' : ('bp-' + raw);
  const lbl = isClaud ? 'CLAUDE' : raw.toUpperCase();
  return `<span class="badge ${cls}">${lbl}</span>`;
}

function renderStoryCard(s, color) {
  const done     = isDone(s);
  const statKey  = done ? 'completed' : (s.status||'pending');
  const mi       = modelInfo(s);
  const expanded = expandedStories.has(s.id);

  return `
<div class="story-card">
  <div class="story-row" onclick="toggleStory('${s.id}')">
    <span class="story-id">${esc(s.id)}</span>
    <span class="story-title" title="${esc(s.title)}">${esc(s.title)}</span>
    <div class="badges">
      <span class="badge bs-${statKey.replace('_','-')}">${statKey.replace('_',' ').toUpperCase()}</span>
      <span class="badge be-${(s.effort||'medium').toLowerCase()}">${(s.effort||'medium').toUpperCase()}</span>
      <span class="badge bl-${mi.cls}">${mi.turns === '—' ? mi.label : mi.label + '·' + (mi.turns === 'unlimited' ? '∞' : mi.turns) + 'T'}</span>
      ${providerBadge(s)}
    </div>
    <span class="expand-icon ${expanded?'open':''}">▶</span>
  </div>
  ${expanded ? renderStoryDetail(s, color) : ''}
</div>`;
}

// ── Story detail ──────────────────────────────────────────────────────────────

function renderStoryDetail(s, color) {
  const mi   = modelInfo(s);
  const prioCol = s.priority==='critical'?'#ef4444':s.priority==='high'?'#fb923c':'var(--text2)';
  const utCol   = s.unitTests===false ? '#ef4444':'#10b981';
  const utLbl   = s.unitTests===false ? 'Disabled':'Enabled';

  const acHtml = (s.acceptanceCriteria||[]).map(c =>
    `<li class="ac-item"><span class="ac-ck">▸</span><span>${esc(c)}</span></li>`
  ).join('');

  const depsHtml = (s.dependencies||[]).length
    ? s.dependencies.map(d => `<span class="dep-chip">${esc(d)}</span>`).join('')
    : `<span style="color:var(--text3)">None</span>`;

  const doneRow = s.completedAt
    ? `<tr><td class="mk">Completed</td><td class="mv" style="color:var(--text3)">${esc(s.completedAt.slice?s.completedAt.slice(0,10):s.completedAt)}</td></tr>` : '';

  // Actuals panel (only if any actual data)
  const hasActuals = (s.actualCost||0) > 0 || (s.actualTokens||0) > 0 || (s.actualHours||0) > 0;
  const actualsHtml = hasActuals ? `
    <div class="actuals-bar">
      ${s.actualHours  ? `<div class="act-item"><span class="act-lbl">Actual Hours</span><span class="act-val">${s.actualHours}h</span></div>` : ''}
      ${s.actualCost   ? `<div class="act-item"><span class="act-lbl">Actual Cost</span><span class="act-val">$${Number(s.actualCost).toFixed(4)}</span></div>` : ''}
      ${s.actualTokens ? `<div class="act-item"><span class="act-lbl">Actual Tokens</span><span class="act-val">${Number(s.actualTokens).toLocaleString()}</span></div>` : ''}
    </div>` : '';

  return `
<div class="story-detail" style="background:${color.detailBg}">
  <div class="detail-grid">
    <div>
      <div class="dl-t">Description</div>
      <div class="dl-v dl-vt">${esc(s.description||'—')}</div>
      ${acHtml ? `<div class="dl-t">Acceptance Criteria</div><ul class="ac-list">${acHtml}</ul>` : ''}
    </div>
    <div>
      <div class="dl-t">Metadata</div>
      <table class="meta-tbl">
        <tr><td class="mk">Agent Role</td>  <td class="mv" style="color:#22d3ee">${esc(s.agentRole||'—')}</td></tr>
        <tr><td class="mk">Agent Group</td> <td class="mv">${esc(s.agentGroup||'—')}</td></tr>
        <tr><td class="mk">Priority</td>    <td class="mv" style="color:${prioCol}">${esc(s.priority||'—')}</td></tr>
        <tr><td class="mk">Est. Hours</td>  <td class="mv">${s.estimatedHours!=null?s.estimatedHours+'h':'—'}</td></tr>
        <tr><td class="mk">Est. Cost</td>   <td class="mv">${s.estimatedCost!=null?'$'+Number(s.estimatedCost).toFixed(2):'—'}</td></tr>
        <tr><td class="mk">Est. Tokens</td> <td class="mv">${s.estimatedTokens!=null?Number(s.estimatedTokens).toLocaleString():'—'}</td></tr>
        <tr><td class="mk">AI Provider</td> <td class="mv">${providerBadge(s)}</td></tr>
        <tr><td class="mk">Model</td>       <td class="mv" style="color:#a78bfa">${mi.turns === '—' ? mi.label : esc(s.model||mi.label)}</td></tr>
        ${mi.turns !== '—' ? `<tr><td class="mk">Max Turns</td><td class="mv">${mi.turns==='unlimited'?'∞ Unlimited':mi.turns}</td></tr>` : ''}
        <tr><td class="mk">Story Type</td>  <td class="mv">${esc(s.storyType||'implementation')}</td></tr>
        <tr><td class="mk">Unit Tests</td>  <td class="mv" style="color:${utCol}">${utLbl}</td></tr>
        ${doneRow}
      </table>
      <div class="dl-t" style="margin-top:11px">Dependencies</div>
      <div>${depsHtml}</div>
    </div>
  </div>
  ${actualsHtml}
  <div class="dl-t">Technical Notes</div>
  <div class="tn-wrap">${renderTechNotes(s.technicalNotes)}</div>
</div>`;
}

// ── Technical notes ───────────────────────────────────────────────────────────

function renderTechNotes(tn) {
  if (!tn) return `<span style="color:var(--text3)">—</span>`;
  if (typeof tn === 'string') {
    try { tn = JSON.parse(tn); } catch(e) { return `<span>${esc(tn)}</span>`; }
  }
  if (!tn || typeof tn !== 'object' || !Object.keys(tn).length)
    return `<span style="color:var(--text3)">—</span>`;
  const rows = Object.entries(tn).map(([k, v]) => {
    const label = k.replace(/([A-Z])/g,' $1').replace(/^./,c=>c.toUpperCase());
    let val;
    if (Array.isArray(v)) {
      val = v.length
        ? `<ul class="tn-list">${v.map(i=>`<li>${esc(String(i))}</li>`).join('')}</ul>`
        : `<em style="color:var(--text3)">empty</em>`;
    } else if (typeof v === 'boolean') {
      val = v ? `<span style="color:#06b6d4">✓ Yes</span>`
              : `<span style="color:#ef4444">✗ No</span>`;
    } else if (v === null || v === undefined) {
      val = `<span style="color:var(--text3)">—</span>`;
    } else if (typeof v === 'object') {
      val = `<pre class="tn-nested">${esc(JSON.stringify(v,null,2))}</pre>`;
    } else {
      val = `<span>${esc(String(v))}</span>`;
    }
    return `<tr><td class="tnk">${esc(label)}</td><td class="tnv">${val}</td></tr>`;
  });
  return `<table class="tn-tbl">${rows.join('')}</table>`;
}

// ── Interactions ──────────────────────────────────────────────────────────────

function toggleStory(id) {
  expandedStories.has(id) ? expandedStories.delete(id) : expandedStories.add(id);
  renderContent();
}
function togglePhase(id) {
  collapsedPhases.has(id) ? collapsedPhases.delete(id) : collapsedPhases.add(id);
  renderContent();
}
function setFilter(mode) {
  filterMode = mode;
  document.querySelectorAll('.filter-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.f === mode));
  renderContent();
}
function expandAll() {
  const q = searchQuery.toLowerCase();
  phaseOrder.forEach(ph => {
    (prd?.implementationOrder[ph]||[]).forEach(id => {
      const s = storyMap[id]; if (!s) return;
      if (filterMode==='pending'   && isDone(s)) return;
      if (filterMode==='completed' && !isDone(s)) return;
      if (q && !(s.id+' '+s.title).toLowerCase().includes(q)) return;
      expandedStories.add(id);
    });
  });
  renderContent();
}
function collapseAll() { expandedStories.clear(); renderContent(); }

// ── Helpers ───────────────────────────────────────────────────────────────────

function isDone(s) { return !!(s.completed || s.status === 'completed'); }
function esc(v) {
  if (v == null) return '';
  return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let searchTimer;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { searchQuery = e.target.value.trim(); renderContent(); }, 180);
});

// Auto-refresh every 15s
setInterval(() => {
  if (!prd) return;
  fetch(API_BASE + '/api/prd?_=' + Date.now())
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      if (!data) return;
      prd = data;
      storyMap = {};
      (prd.stories||[]).forEach(s => { storyMap[s.id] = s; });
      setApiStatus('ok');
      renderStats();
      renderContent();
    })
    .catch(() => setApiStatus('err'));
}, 15000);

loadPrd();
</script>

</html>
