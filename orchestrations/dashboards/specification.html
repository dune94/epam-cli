<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Specification Diff — EPAM CLI Remote</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #fbfafa; --bg1: #ffffff; --bg2: #f4f4f4; --bg3: #eaeaea;
  --surface: #ffffff; --border: #e0e0e0; --border2: #cccccc;
  --text: #060606; --text2: #4a4a4a; --text3: #717171;
  --teal: #0047ff; --teal2: #0047ff; --teal-dim: rgba(0,71,255,0.08);
  --violet: #8453d2; --violet-dim: rgba(132,83,210,0.10);
  --green: #1a8f3f; --green-dim: rgba(26,143,63,0.10);
  --amber: #c87a00; --amber-dim: rgba(200,122,0,0.10);
  --red: #d93025; --red-dim: rgba(217,48,37,0.08);
  --epam-gradient: linear-gradient(118.82deg, #0078c2 .5%, #0047ff 47.33%, #8453d2 76.12%);
}

body {
  background: var(--bg); color: var(--text);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  font-size: 14px; line-height: 1.5; min-height: 100vh;
}

/* ── Header ── */
.header {
  background: var(--epam-gradient);
  padding: 16px 28px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.header-left { display: flex; align-items: center; gap: 13px; }
.header-icon {
  width: 36px; height: 36px; background: rgba(255,255,255,0.2);
  border-radius: 7px; display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.header-title { font-size: 19px; font-weight: 800; color: #fff; letter-spacing: -0.3px; }
.header-sub { color: rgba(255,255,255,0.7); font-size: 11px; margin-top: 1px; letter-spacing: 0.3px; }
.header-meta { text-align: right; color: rgba(255,255,255,0.7); font-size: 11px; line-height: 1.8; }
.nav-links { font-size: 11px; display: flex; gap: 10px; flex-wrap: wrap; }
.nav-links a { color: #fff; text-decoration: none; opacity: .7; transition: opacity .15s; }
.nav-links a:hover { opacity: 1; }
.nav-links a.active { border-bottom: 2px solid #fff; padding-bottom: 2px; }

/* ── Stats bar ── */
.stats-bar {
  background: var(--bg1); border-bottom: 1px solid var(--border);
  padding: 9px 28px; display: flex; gap: 24px; align-items: center; flex-wrap: wrap; min-height: 44px;
}
.stat-chip { display: flex; align-items: center; gap: 7px; font-size: 12px; }
.stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.stat-lbl { color: var(--text3); }
.stat-num { font-weight: 700; font-size: 15px; }

/* ── Content ── */
.content { padding: 18px 28px 52px; max-width: 1600px; margin: 0 auto; }

/* ── Summary cards ── */
.summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
.summary-card {
  background: var(--bg1); border: 1px solid var(--border); border-radius: 8px;
  padding: 14px 16px; text-align: center;
}
.sc-label { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-bottom: 6px; }
.sc-value { font-size: 24px; font-weight: 800; }
.sc-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.sc-added { color: var(--green); }
.sc-removed { color: var(--red); }
.sc-modified { color: var(--amber); }
.sc-unchanged { color: var(--teal); }

/* ── Diff table ── */
.diff-section { margin-bottom: 24px; }
.diff-title {
  font-size: 13px; font-weight: 800; letter-spacing: 0.3px;
  padding: 10px 14px; background: var(--bg1); border: 1px solid var(--border);
  border-radius: 8px 8px 0 0; border-left: 4px solid var(--teal);
}
.diff-table { width: 100%; border-collapse: collapse; border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; overflow: hidden; }
.diff-table th {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 7px 12px; font-size: 9px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--text3); text-align: left;
}
.diff-table td { padding: 8px 12px; font-size: 12px; border-bottom: 1px solid rgba(0,0,0,0.04); vertical-align: top; }
.diff-table tr:last-child td { border-bottom: none; }
.diff-table tr:hover { background: rgba(0,71,255,0.02); }

.diff-row-added { background: rgba(26,143,63,0.04); }
.diff-row-removed { background: rgba(217,48,37,0.04); }
.diff-row-modified { background: rgba(200,122,0,0.04); }

/* ── Badges ── */
.badge { font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 3px; letter-spacing: 0.4px; white-space: nowrap; display: inline-block; }
.b-added { background: rgba(26,143,63,0.10); color: #1a8f3f; border: 1px solid rgba(26,143,63,0.25); }
.b-removed { background: rgba(217,48,37,0.08); color: #d93025; border: 1px solid rgba(217,48,37,0.25); }
.b-modified { background: rgba(200,122,0,0.10); color: #c87a00; border: 1px solid rgba(200,122,0,0.25); }
.b-unchanged { background: rgba(0,71,255,0.08); color: #0047ff; border: 1px solid rgba(0,71,255,0.2); }

.story-id {
  font-size: 11px; font-weight: 700; font-family: 'Courier New', monospace;
  background: rgba(0,71,255,0.08); color: #0047ff; border: 1px solid rgba(0,71,255,0.2);
  border-radius: 5px; padding: 3px 9px; display: inline-block;
}

/* ── Field diff ── */
.field-diff { margin: 4px 0; }
.fd-key { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.3px; }
.fd-old { color: var(--red); text-decoration: line-through; font-size: 11px; }
.fd-new { color: var(--green); font-size: 11px; }
.fd-arrow { color: var(--text3); font-size: 10px; margin: 0 4px; }

/* ── Phase diff ── */
.phase-chip {
  display: inline-block; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 3px; padding: 1px 6px; font-size: 10px;
  font-family: 'Courier New', monospace; color: var(--teal2); margin: 2px 3px 2px 0;
}

/* ── Controls ── */
.controls {
  background: var(--bg1); border-bottom: 1px solid var(--border);
  padding: 9px 28px; display: flex; gap: 9px; align-items: center; flex-wrap: wrap;
}
.ctrl-btn {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 5px;
  color: var(--text3); padding: 5px 10px; font-size: 11px; cursor: pointer; transition: all 0.14s;
}
.ctrl-btn:hover { color: var(--text); border-color: var(--teal); }
.ctrl-btn.active { background: rgba(0,71,255,0.08); border-color: #0047ff; color: #0047ff; }
.ctrl-gap { margin-left: auto; }
.api-status { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; letter-spacing: 0.3px; }
.api-ok { background: rgba(26,143,63,0.10); color: #1a8f3f; border: 1px solid rgba(26,143,63,0.25); }
.api-err { background: rgba(217,48,37,0.08); color: #d93025; border: 1px solid rgba(217,48,37,0.25); }
.api-wait { background: var(--bg2); color: var(--text3); border: 1px solid var(--border); }

/* ── Expandable detail ── */
.detail-toggle { cursor: pointer; color: var(--teal); font-size: 10px; font-weight: 700; }
.detail-toggle:hover { text-decoration: underline; }
.detail-panel { display: none; padding: 12px 14px; background: var(--bg2); border-radius: 0 0 6px 6px; margin-top: 4px; border: 1px solid var(--border); border-top: none; }
.detail-panel.open { display: block; }

/* ── Story detail card ── */
.story-detail-card { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
.sdc-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg1); cursor: pointer; transition: background 0.12s; }
.sdc-header:hover { background: var(--bg2); }
.sdc-chevron { font-size: 10px; color: var(--text3); transition: transform 0.2s; }
.sdc-chevron.open { transform: rotate(90deg); color: var(--teal); }
.sdc-title { flex: 1; font-size: 13px; font-weight: 600; }
.sdc-body { padding: 14px; border-top: 1px solid var(--border); }

/* ── Agent contribution card ── */
.agent-card { background: var(--bg1); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; border-left: 3px solid var(--violet); }
.agent-card.openspec { border-left-color: var(--teal); }
.agent-card.speckit { border-left-color: var(--violet); }
.agent-card.coordinator { border-left-color: var(--amber); }
.ac-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.ac-agent-name { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
.ac-agent-name.openspec { color: var(--teal); }
.ac-agent-name.speckit { color: var(--violet); }
.ac-agent-name.coordinator { color: var(--amber); }
.ac-notes { font-size: 11px; color: var(--text2); line-height: 1.6; margin-bottom: 6px; padding: 6px 8px; background: var(--bg); border-radius: 4px; }
.ac-stat { font-size: 10px; color: var(--text3); display: inline-flex; align-items: center; gap: 4px; margin-right: 12px; }
.ac-stat strong { color: var(--text2); }

/* ── Acceptance criteria diff ── */
.ac-diff { margin: 8px 0; }
.ac-diff-title { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); margin-bottom: 4px; }
.ac-item { font-size: 11px; padding: 3px 0; color: var(--text2); display: flex; gap: 6px; align-items: flex-start; }
.ac-item-add { color: var(--green); }
.ac-item-rm { color: var(--red); text-decoration: line-through; }
.ac-bullet { flex-shrink: 0; margin-top: 2px; font-size: 9px; }

/* ── Coordinator review ── */
.coord-review { background: var(--bg1); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin-top: 8px; border-left: 3px solid var(--amber); }
.coord-verdict { font-size: 11px; font-weight: 800; }
.coord-verdict.approved { color: var(--green); }
.coord-verdict.needs_review { color: var(--amber); }
.coord-score { font-size: 20px; font-weight: 800; color: var(--teal); }
.coord-flags { list-style: none; padding: 0; margin: 4px 0; }
.coord-flags li { font-size: 11px; color: var(--amber); padding: 2px 0; }
.coord-flags li::before { content: '! '; font-weight: 800; }

/* ── Split children ── */
.split-child { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 8px 10px; margin: 4px 0; }
.split-child-id { font-size: 10px; font-weight: 700; font-family: monospace; color: var(--green); }
.split-child-title { font-size: 12px; color: var(--text); margin-left: 8px; }

/* ── Section label ── */
.section-label { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--teal); margin: 12px 0 6px; }

/* ── Loading ── */
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 6px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-blk { text-align: center; padding: 80px; color: var(--text3); font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-icon">&#x1F50D;</div>
    <div>
      <div class="header-title">Specification Diff</div>
      <div class="header-sub">PRD Baseline vs Current — /remote Feature</div>
      <div class="nav-links">
        <a href="monitor.html">Monitor</a>
        <a href="prd-viewer.html">PRD Viewer</a>
        <a href="specification.html" class="active">Spec Diff</a>
        <a href="orchestration-plan.html">Plan</a>
        <a href="agents-orchestration.html">Orchestration</a>
        <a href="agent-profiles.html">Profiles</a>
        <a href="agent-messages.html">Messages</a>
        <a href="phase-cost-monitor.html">Costs</a>
      </div>
    </div>
  </div>
  <div class="header-meta">
    <div id="load-time"></div>
    <div><span class="api-status api-wait" id="api-status">LOADING</span></div>
  </div>
</div>

<div class="stats-bar" id="stats-bar">
  <div style="color:var(--text3);font-size:12px"><span class="spinner"></span>Loading...</div>
</div>

<div class="controls">
  <button class="ctrl-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
  <button class="ctrl-btn" data-filter="added" onclick="setFilter('added',this)">Added</button>
  <button class="ctrl-btn" data-filter="removed" onclick="setFilter('removed',this)">Removed</button>
  <button class="ctrl-btn" data-filter="modified" onclick="setFilter('modified',this)">Modified</button>
  <button class="ctrl-btn" data-filter="unchanged" onclick="setFilter('unchanged',this)">Unchanged</button>
  <div class="ctrl-gap"></div>
  <button class="ctrl-btn" onclick="location.reload()">Refresh</button>
</div>

<div class="content" id="content">
  <div class="loading-blk"><span class="spinner"></span> Loading PRD files...</div>
</div>

<script>
const BASELINE_URL = 'prd-baseline.json';
const CURRENT_URL = 'prd.json';
const SPEC_LOG_URL = 'logs/spec-phase.jsonl';

let currentFilter = 'all';
let diffResult = null;
let specLog = [];

async function loadJSON(url) {
  const r = await fetch(url + '?t=' + Date.now());
  if (!r.ok) throw new Error(`Failed to load ${url}: ${r.status}`);
  return r.json();
}

async function loadJSONL(url) {
  try {
    const r = await fetch(url + '?t=' + Date.now());
    if (!r.ok) return [];
    const text = await r.text();
    return text.trim().split('\n').filter(Boolean).map(line => { try { return JSON.parse(line); } catch(e) { return null; } }).filter(Boolean);
  } catch(e) { return []; }
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.controls .ctrl-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (diffResult) render(diffResult);
}

function diffStories(baseline, current) {
  const baseMap = {}; (baseline.stories || []).forEach(s => baseMap[s.id] = s);
  const currMap = {}; (current.stories || []).forEach(s => currMap[s.id] = s);
  const allIds = new Set([...Object.keys(baseMap), ...Object.keys(currMap)]);
  const added = [], removed = [], modified = [], unchanged = [];
  allIds.forEach(id => {
    const b = baseMap[id], c = currMap[id];
    if (!b && c) { added.push({ id, current: c, type: 'added' }); }
    else if (b && !c) { removed.push({ id, baseline: b, type: 'removed' }); }
    else {
      const changes = diffFields(b, c);
      if (changes.length > 0) { modified.push({ id, baseline: b, current: c, changes, type: 'modified' }); }
      else { unchanged.push({ id, baseline: b, current: c, type: 'unchanged' }); }
    }
  });
  return { added, removed, modified, unchanged, baseline, current };
}

function diffFields(a, b) {
  const skip = new Set(['lastAttempt', 'cpaConfidence', 'cpaGate', 'specification']);
  const changes = [];
  const allKeys = new Set([...Object.keys(a), ...Object.keys(b)]);
  allKeys.forEach(k => {
    if (skip.has(k)) return;
    const av = JSON.stringify(a[k]), bv = JSON.stringify(b[k]);
    if (av !== bv) changes.push({ field: k, old: a[k], new: b[k] });
  });
  return changes;
}

function diffPhases(baseline, current) {
  const bp = baseline.implementationOrder || {}, cp = current.implementationOrder || {};
  const allPhases = new Set([...Object.keys(bp), ...Object.keys(cp)]);
  const results = [];
  allPhases.forEach(p => {
    const bS = bp[p] || null, cS = cp[p] || null;
    if (!bS && cS) results.push({ phase: p, type: 'added', stories: cS });
    else if (bS && !cS) results.push({ phase: p, type: 'removed', stories: bS });
    else if (JSON.stringify(bS) !== JSON.stringify(cS)) results.push({ phase: p, type: 'modified', oldStories: bS, newStories: cS });
    else results.push({ phase: p, type: 'unchanged', stories: cS });
  });
  return results;
}

// ── Render helpers ──
function esc(s) { const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
function fmt(v) { if (v === undefined) return '(undefined)'; if (v === null) return '(null)'; if (typeof v === 'object') return JSON.stringify(v); return String(v); }
function sumHours(stories) { return Math.round(stories.reduce((s, st) => s + (st.estimatedHours || 0), 0) * 10) / 10; }
function summaryCard(label, value, cls, sub) { return `<div class="summary-card"><div class="sc-label">${label}</div><div class="sc-value ${cls}">${value}</div><div class="sc-sub">${sub}</div></div>`; }

function toggleDetail(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('open');
  const chev = document.getElementById('chev-' + id);
  if (chev) chev.classList.toggle('open');
}

// Get spec log entries for a story
function getSpecEntries(storyId) { return specLog.filter(e => e.story_id === storyId); }

// Find split children in current prd
function getSplitChildren(parentId, current) {
  return (current.stories || []).filter(s => s.specification && s.specification.createdFrom === parentId);
}

// Render agent contribution card
function renderAgentCard(entry) {
  const agent = entry.agent || 'unknown';
  const agentCls = agent.includes('openspec') ? 'openspec' : agent.includes('speckit') ? 'speckit' : '';
  let h = `<div class="agent-card ${agentCls}">`;
  h += `<div class="ac-header"><span class="ac-agent-name ${agentCls}">${esc(agent)}</span>`;
  if (entry.acceptanceChanged) h += `<span class="badge b-modified" style="font-size:8px">AC UPDATED</span>`;
  if (entry.splitStories && entry.splitStories.length) h += `<span class="badge b-added" style="font-size:8px">+${entry.splitStories.length} SPLIT</span>`;
  h += '</div>';
  if (entry.notes) h += `<div class="ac-notes">${esc(entry.notes)}</div>`;
  // Stats
  h += '<div>';
  const bac = (entry.before && entry.before.acceptanceCriteria) ? entry.before.acceptanceCriteria.length : 0;
  const aac = (entry.after && entry.after.acceptanceCriteria) ? entry.after.acceptanceCriteria.length : 0;
  h += `<span class="ac-stat">AC: <strong>${bac} &rarr; ${aac}</strong></span>`;
  if (entry.splitStories && entry.splitStories.length) h += `<span class="ac-stat">Splits: <strong>${entry.splitStories.length}</strong></span>`;
  h += `<span class="ac-stat">Time: <strong>${entry.timestamp ? new Date(entry.timestamp).toLocaleTimeString() : '?'}</strong></span>`;
  h += '</div>';
  // AC diff
  if (entry.before && entry.after && entry.acceptanceChanged) {
    const bSet = new Set(entry.before.acceptanceCriteria || []);
    const aSet = new Set(entry.after.acceptanceCriteria || []);
    const added = [...aSet].filter(x => !bSet.has(x));
    const removed = [...bSet].filter(x => !aSet.has(x));
    if (added.length || removed.length) {
      h += '<div class="ac-diff"><div class="ac-diff-title">Acceptance Criteria Changes</div>';
      removed.forEach(ac => { h += `<div class="ac-item ac-item-rm"><span class="ac-bullet">-</span>${esc(ac)}</div>`; });
      added.forEach(ac => { h += `<div class="ac-item ac-item-add"><span class="ac-bullet">+</span>${esc(ac)}</div>`; });
      h += '</div>';
    }
  }
  h += '</div>';
  return h;
}

// Render coordinator review
function renderCoordinatorReview(spec) {
  if (!spec || !spec.coordinatorReview) return '';
  const rev = spec.coordinatorReview;
  let h = `<div class="coord-review"><div class="ac-header"><span class="ac-agent-name coordinator">Coordinator Review</span>`;
  h += `<span class="coord-verdict ${rev.verdict || ''}">${(rev.verdict || 'pending').toUpperCase()}</span>`;
  if (typeof rev.qualityScore === 'number') h += `<span class="coord-score" style="margin-left:auto">${(rev.qualityScore * 100).toFixed(0)}%</span>`;
  h += '</div>';
  if (rev.reviewNotes) h += `<div class="ac-notes">${esc(rev.reviewNotes)}</div>`;
  if (rev.flags && rev.flags.length) {
    h += '<ul class="coord-flags">';
    rev.flags.forEach(f => { h += `<li>${esc(f)}</li>`; });
    h += '</ul>';
  }
  if (rev.reviewedAt) h += `<span class="ac-stat">Reviewed: <strong>${new Date(rev.reviewedAt).toLocaleString()}</strong></span>`;
  h += '</div>';
  return h;
}

// Render coordinator assignment notes
function renderCoordinatorNotes(spec) {
  if (!spec || !spec.coordinatorNotes) return '';
  let h = `<div class="agent-card coordinator"><div class="ac-header"><span class="ac-agent-name coordinator">Coordinator Assignment</span>`;
  if (spec.assignedAgents) h += spec.assignedAgents.map(a => `<span class="badge" style="background:rgba(132,83,210,0.10);color:#8453d2;border:1px solid rgba(132,83,210,0.25);font-size:8px">${esc(a)}</span>`).join(' ');
  h += '</div>';
  h += `<div class="ac-notes">${esc(spec.coordinatorNotes)}</div>`;
  h += '</div>';
  return h;
}

// Render full story detail panel
function renderStoryDetail(story, baselineStory, type, current) {
  const spec = story.specification;
  const entries = getSpecEntries(story.id);
  const children = getSplitChildren(story.id, current);
  let h = '';

  // Coordinator assignment
  if (spec) h += renderCoordinatorNotes(spec);

  // Agent contributions from spec log
  if (entries.length > 0) {
    h += '<div class="section-label">Agent Contributions</div>';
    entries.forEach(e => { h += renderAgentCard(e); });
  } else if (spec && spec.agentContributions && spec.agentContributions.length) {
    h += '<div class="section-label">Agent Contributions (Sequential Pipeline)</div>';
    spec.agentContributions.forEach((c, idx) => {
      const agentCls = c.agent === 'openspec' ? 'openspec' : c.agent === 'speckit' ? 'speckit' : '';
      const stepLabel = idx === 0 ? 'Step 1: Elaborate' : 'Step 2: Review &amp; Harden';
      let card = `<div class="agent-card ${agentCls}"><div class="ac-header"><span class="ac-agent-name ${agentCls}">${esc(c.agent)}</span>`;
      card += `<span class="badge" style="background:rgba(0,0,0,0.05);color:var(--text3);font-size:8px">${stepLabel}</span>`;
      if (c.applied) card += '<span class="badge b-modified" style="font-size:8px">APPLIED</span>';
      else card += '<span class="badge b-unchanged" style="font-size:8px">NOT APPLIED</span>';
      card += '</div>';
      if (c.notes) card += `<div class="ac-notes">${esc(c.notes)}</div>`;
      card += `<span class="ac-stat">AC changed: <strong>${c.acceptanceChanged ? 'Yes' : 'No'}</strong></span>`;
      if (c.splitCount) card += `<span class="ac-stat">Splits: <strong>${c.splitCount}</strong></span>`;
      // Show speckit-specific collaboration details
      if (c.acAddedBySpeckit && c.acAddedBySpeckit.length) {
        card += `<div class="section-label" style="margin-top:6px">Criteria Added by speckit (${c.acAddedBySpeckit.length})</div>`;
        card += '<div class="ac-diff">';
        c.acAddedBySpeckit.forEach(ac => { card += `<div class="ac-item ac-item-add"><span class="ac-bullet">+</span>${esc(ac)}</div>`; });
        card += '</div>';
      }
      if (c.acModifiedBySpeckit && c.acModifiedBySpeckit.length) {
        card += `<div class="section-label" style="margin-top:6px">Criteria Refined by speckit (${c.acModifiedBySpeckit.length})</div>`;
        card += '<div class="ac-diff">';
        c.acModifiedBySpeckit.forEach(m => {
          card += `<div class="ac-item ac-item-rm"><span class="ac-bullet">~</span>${esc(m.original)}</div>`;
          card += `<div class="ac-item ac-item-add"><span class="ac-bullet">&rarr;</span>${esc(m.revised)}</div>`;
        });
        card += '</div>';
      }
      if (c.acFlagged && c.acFlagged.length) {
        card += `<div class="section-label" style="margin-top:6px">Flagged for Human Review (${c.acFlagged.length})</div>`;
        card += '<ul class="coord-flags">';
        c.acFlagged.forEach(f => { card += `<li><strong>${esc(f.criterion.substring(0,60))}…</strong> — ${esc(f.flag)}</li>`; });
        card += '</ul>';
      }
      card += '</div>';
      h += card;
    });
  }

  // Coordinator review
  if (spec) h += renderCoordinatorReview(spec);

  // For modified: show field-level changes (excluding spec metadata)
  if (type === 'modified' && baselineStory) {
    const bAC = baselineStory.acceptanceCriteria || [];
    const cAC = story.acceptanceCriteria || [];
    if (JSON.stringify(bAC) !== JSON.stringify(cAC)) {
      const bSet = new Set(bAC), aSet = new Set(cAC);
      const added = [...aSet].filter(x => !bSet.has(x));
      const removed = [...bSet].filter(x => !aSet.has(x));
      if (added.length || removed.length) {
        h += '<div class="section-label">Acceptance Criteria Diff (Net)</div>';
        h += '<div class="ac-diff">';
        removed.forEach(ac => { h += `<div class="ac-item ac-item-rm"><span class="ac-bullet">-</span>${esc(ac)}</div>`; });
        added.forEach(ac => { h += `<div class="ac-item ac-item-add"><span class="ac-bullet">+</span>${esc(ac)}</div>`; });
        h += '</div>';
      }
    }
  }

  // For added stories: show full AC list + origin
  if (type === 'added') {
    if (spec && spec.createdFrom) {
      h += `<div class="section-label">Origin</div><div style="font-size:11px;color:var(--text2)">Split from <span class="story-id">${esc(spec.createdFrom)}</span></div>`;
    }
    if (story.acceptanceCriteria && story.acceptanceCriteria.length) {
      h += '<div class="section-label">Acceptance Criteria</div><div class="ac-diff">';
      story.acceptanceCriteria.forEach(ac => { h += `<div class="ac-item ac-item-add"><span class="ac-bullet">+</span>${esc(ac)}</div>`; });
      h += '</div>';
    }
    // Show technical notes
    if (story.technicalNotes) {
      h += '<div class="section-label">Technical Notes</div><div style="font-size:11px;color:var(--text2)">';
      if (story.technicalNotes.files && story.technicalNotes.files.length) h += `<strong>Files:</strong> ${story.technicalNotes.files.map(f => `<code>${esc(f)}</code>`).join(', ')}<br>`;
      if (story.technicalNotes.requiredSkills && story.technicalNotes.requiredSkills.length) h += `<strong>Skills:</strong> ${story.technicalNotes.requiredSkills.join(', ')}`;
      h += '</div>';
    }
  }

  // Split children
  if (children.length > 0) {
    h += '<div class="section-label">Split Children</div>';
    children.forEach(c => {
      h += `<div class="split-child"><span class="split-child-id">${esc(c.id)}</span><span class="split-child-title">${esc(c.title)}</span>`;
      if (c.acceptanceCriteria) h += `<span class="ac-stat" style="display:block;margin-top:4px">AC: <strong>${c.acceptanceCriteria.length} criteria</strong></span>`;
      h += '</div>';
    });
  }

  // Description
  if (story.description) {
    h += `<div class="section-label">Description</div><div style="font-size:11px;color:var(--text2);line-height:1.6">${esc(story.description)}</div>`;
  }

  return h;
}

function render(diff) {
  const { added, removed, modified, unchanged, baseline, current } = diff;
  const total = added.length + removed.length + modified.length + unchanged.length;
  const bHours = sumHours(baseline.stories || []);
  const cHours = sumHours(current.stories || []);
  const specStories = (current.stories || []).filter(s => s.specification);
  const reviewedCount = specStories.filter(s => s.specification.coordinatorReview).length;
  const approvedCount = specStories.filter(s => s.specification.coordinatorReview && s.specification.coordinatorReview.verdict === 'approved').length;

  // Stats bar
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-chip"><div class="stat-dot" style="background:var(--green)"></div><span class="stat-lbl">Added</span><span class="stat-num">${added.length}</span></div>
    <div class="stat-chip"><div class="stat-dot" style="background:var(--amber)"></div><span class="stat-lbl">Modified</span><span class="stat-num">${modified.length}</span></div>
    <div class="stat-chip"><div class="stat-dot" style="background:var(--teal)"></div><span class="stat-lbl">Unchanged</span><span class="stat-num">${unchanged.length}</span></div>
    <div class="stat-chip"><span class="stat-lbl">Total</span><span class="stat-num">${total}</span></div>
    <div class="stat-chip"><span class="stat-lbl">Hours</span><span class="stat-num">${bHours}h &rarr; ${cHours}h</span></div>
    <div class="stat-chip"><span class="stat-lbl">Spec Entries</span><span class="stat-num">${specLog.length}</span></div>
    <div class="stat-chip"><span class="stat-lbl">Reviewed</span><span class="stat-num">${approvedCount}/${reviewedCount}</span></div>
  `;

  let html = '';

  // Summary cards
  html += '<div class="summary-grid">';
  html += summaryCard('Stories Added', added.length, 'sc-added', `+${sumHours(added.map(a=>a.current))}h estimated`);
  html += summaryCard('Stories Modified', modified.length, 'sc-modified', `${specLog.length} agent entries`);
  html += summaryCard('Unchanged', unchanged.length, 'sc-unchanged', 'No spec changes');
  html += summaryCard('Baseline', (baseline.stories||[]).length, '', `${bHours}h total`);
  html += summaryCard('Current', (current.stories||[]).length, '', `${cHours}h total`);
  html += summaryCard('Coord Reviewed', reviewedCount, approvedCount === reviewedCount ? 'sc-added' : 'sc-modified', `${approvedCount} approved`);
  html += '</div>';

  // Phase changes
  const phaseDiffs = diffPhases(baseline, current);
  const visPhases = phaseDiffs.filter(p => currentFilter === 'all' || p.type === currentFilter);
  if (visPhases.length > 0) {
    html += '<div class="diff-section">';
    html += '<div class="diff-title">Implementation Phases</div>';
    html += '<table class="diff-table"><tr><th>Phase</th><th>Status</th><th>Baseline</th><th>Current</th></tr>';
    visPhases.forEach(p => {
      const cls = p.type === 'modified' ? 'diff-row-modified' : '';
      const bCount = (baseline.implementationOrder || {})[p.phase] ? (baseline.implementationOrder[p.phase]).length : 0;
      const cCount = (current.implementationOrder || {})[p.phase] ? (current.implementationOrder[p.phase]).length : 0;
      html += `<tr class="${cls}"><td><span class="phase-chip">${esc(p.phase)}</span></td><td><span class="badge b-${p.type}">${p.type.toUpperCase()}</span></td><td>${bCount} stories</td><td>${cCount} stories</td></tr>`;
    });
    html += '</table></div>';
  }

  // Story sections with expandable detail cards
  const sections = [
    { label: 'Added Stories (Spec Splits)', items: added, type: 'added' },
    { label: 'Modified Stories (Spec Updated)', items: modified, type: 'modified' },
    { label: 'Unchanged Stories', items: unchanged, type: 'unchanged' },
  ];

  sections.forEach(sec => {
    if (currentFilter !== 'all' && currentFilter !== sec.type) return;
    if (sec.items.length === 0) return;
    html += `<div class="diff-section">`;
    html += `<div class="diff-title">${sec.label} (${sec.items.length})</div>`;

    sec.items.forEach((item, idx) => {
      const s = item.current || item.baseline;
      const spec = s.specification;
      const detailId = `${sec.type}-${idx}`;
      const agents = spec ? (spec.appliedAgents || spec.assignedAgents || []) : [];
      const hasReview = spec && spec.coordinatorReview;

      html += '<div class="story-detail-card">';
      html += `<div class="sdc-header" onclick="toggleDetail('${detailId}')">`;
      html += `<span class="sdc-chevron" id="chev-${detailId}">&#9654;</span>`;
      html += `<span class="story-id">${esc(item.id)}</span>`;
      html += `<span class="sdc-title">${esc(s.title)}</span>`;
      html += `<span class="badge b-${sec.type}">${sec.type.toUpperCase()}</span>`;
      // Agent badges
      agents.forEach(a => {
        const cls = a === 'openspec' ? 'color:var(--teal);background:rgba(0,71,255,0.08);border:1px solid rgba(0,71,255,0.2)' : 'color:var(--violet);background:rgba(132,83,210,0.10);border:1px solid rgba(132,83,210,0.25)';
        html += `<span class="badge" style="${cls};font-size:8px">${esc(a)}</span>`;
      });
      if (hasReview) {
        const vCls = spec.coordinatorReview.verdict === 'approved' ? 'color:var(--green)' : 'color:var(--amber)';
        html += `<span class="badge" style="${vCls};background:rgba(200,122,0,0.08);border:1px solid rgba(200,122,0,0.2);font-size:8px">${(spec.coordinatorReview.verdict || '').toUpperCase()}</span>`;
      }
      if (spec && spec.createdFrom) html += `<span style="font-size:10px;color:var(--text3)">from ${esc(spec.createdFrom)}</span>`;
      html += `<span style="font-size:11px;color:var(--text3);margin-left:auto">${s.estimatedHours || '?'}h</span>`;
      html += '</div>';

      html += `<div class="detail-panel" id="${detailId}"><div class="sdc-body">`;
      html += renderStoryDetail(s, item.baseline || null, sec.type, diff.current);
      html += '</div></div>';
      html += '</div>';
    });
    html += '</div>';
  });

  document.getElementById('content').innerHTML = html;
}

async function init() {
  const t0 = Date.now();
  try {
    const [baseline, current, log] = await Promise.all([loadJSON(BASELINE_URL), loadJSON(CURRENT_URL), loadJSONL(SPEC_LOG_URL)]);
    specLog = log;
    diffResult = diffStories(baseline, current);
    render(diffResult);
    lastDataHash = JSON.stringify(current).length + ':' + current.stories?.length + ':' + log.length;
    document.getElementById('api-status').className = 'api-status api-ok';
    document.getElementById('api-status').textContent = 'LOADED';
    document.getElementById('load-time').textContent = `Loaded in ${Date.now() - t0}ms`;
  } catch (e) {
    document.getElementById('content').innerHTML = `
      <div style="text-align:center;padding:60px;color:var(--red)">
        <div style="font-size:32px;margin-bottom:12px">&#x26A0;</div>
        <h3>Failed to load PRD files</h3>
        <p style="color:var(--text3);margin-top:8px">${esc(e.message)}</p>
      </div>`;
    document.getElementById('api-status').className = 'api-status api-err';
    document.getElementById('api-status').textContent = 'ERROR';
  }
}

// Track data fingerprint to avoid re-rendering when nothing changed
let lastDataHash = '';

setInterval(async () => {
  try {
    const [baseline, current, log] = await Promise.all([loadJSON(BASELINE_URL), loadJSON(CURRENT_URL), loadJSONL(SPEC_LOG_URL)]);
    const hash = JSON.stringify(current).length + ':' + current.stories?.length + ':' + log.length;
    if (hash === lastDataHash) return; // Data unchanged — preserve UI state
    lastDataHash = hash;

    // Preserve expanded panels before re-render
    const openPanels = new Set();
    document.querySelectorAll('.detail-panel.open').forEach(el => openPanels.add(el.id));

    specLog = log;
    diffResult = diffStories(baseline, current);
    render(diffResult);

    // Restore expanded panels after re-render
    openPanels.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.add('open');
      const chev = document.getElementById('chev-' + id);
      if (chev) chev.classList.add('open');
    });
  } catch(e) {}
}, 10000);

init();
</script>
<script src="runtime/build-info.js"></script>
</body>
</html>
