<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EPAM CLI — Orchestration Pipeline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f4f4; }
    #toolbar {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(118.82deg,#0078c2 .5%,#0047ff 47.33%,#8453d2 76.12%);
      color: #fff; padding: 10px 20px;
      display: flex; align-items: center; gap: 16px;
      font-size: 13px; box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    #toolbar strong { font-size: 14px; }
    #toolbar a { color: rgba(255,255,255,.75); text-decoration: none; font-size: 12px; }
    #toolbar a:hover { color: #fff; }
    #toolbar .spacer { flex: 1; }
    #toolbar .badge {
      background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3);
      border-radius: 4px; padding: 2px 8px; font-size: 11px;
    }
    #diagram-container {
      width: 100%; height: calc(100vh - 42px);
    }
    .mxgraph { width: 100%; height: 100%; }
  </style>
</head>
<body>

<div id="toolbar">
  <strong>Orchestration Pipeline</strong>
  <span class="badge">run-agent-orchestration.sh</span>
  <div class="spacer"></div>
  <a href="/">← Dashboards</a>
</div>

<div id="diagram-container">

<script src="https://viewer.diagrams.net/js/viewer-static.min.js"></script>
<script>
  (function () {
    var xml = document.getElementById('diagram-xml').textContent.trim();
    var el  = document.getElementById('diagram');
    el.setAttribute('data-mxgraph', JSON.stringify({
      highlight: '#0000ff',
      nav:       true,
      resize:    true,
      toolbar:   'zoom layers lightbox',
      edit:      '_blank',
      xml:       xml
    }));
    // Trigger the viewer — it scans for .mxgraph elements on load;
    // if already loaded, call render manually.
    if (window.GraphViewer) {
      window.GraphViewer.processElements();
    }
  })();
</script>
